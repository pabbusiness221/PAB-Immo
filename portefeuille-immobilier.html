<title>Mon Portefeuille - Immobilier</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F4F0;
    --surface:#FFFFFF;
    --ink:#161B22;
    --ink-soft:#5C6470;
    --border:#E4E2DA;
    --primary:#1B4F91;   /* bleu principal */
    --primary-dark:#123761;
    --brick:#B24A2C;   /* Terrain */
    --navy:#2E4A61;    /* Maison */
    --teal:#1F7A73;    /* Appartement */
    --gold:#B8842A;    /* Réservé / valeur */
    --sage:#3F7A49;    /* Disponible */
    --stone:#8B9199;   /* Vendu / Loué */
    --shadow: 0 1px 2px rgba(22,27,34,0.05), 0 8px 24px -8px rgba(22,27,34,0.12);
    --shadow-lg: 0 16px 44px -14px rgba(22,27,34,0.32);
    --focus-ring: 0 0 0 3px rgba(27,79,145,0.32);
  }
  *{box-sizing:border-box;}
  html,body{max-width:100%;overflow-x:hidden;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.num,.brand{font-family:'Manrope',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:inherit;}
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{outline:none;box-shadow:var(--focus-ring);border-radius:8px;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important;animation-iteration-count:1 !important;transition-duration:0.001ms !important;}
  }

  header{position:sticky;top:0;z-index:40;background:rgba(246,246,243,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);}
  .header-inner{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 20px;max-width:1400px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand h1{font-size:17px;font-weight:800;margin:0;letter-spacing:-0.01em;}
  .brand p{margin:0;font-size:11px;color:var(--ink-soft);}
  .btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:11px;font-weight:600;font-size:13px;cursor:pointer;padding:10px 16px;font-family:'Inter',sans-serif;transition:transform .15s ease, box-shadow .15s ease;}
  .btn:hover{transform:translateY(-1px);}
  .btn-primary{background:var(--primary);color:#fff;box-shadow:var(--shadow);}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-danger{background:#B24A2C;color:#fff;box-shadow:var(--shadow);}
  .btn-danger:hover{background:#9B3B28;}

  .searchbar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:9px 14px;flex:1;max-width:420px;}
  .searchbar input{border:none;outline:none;font-size:13px;width:100%;background:transparent;font-family:'Inter',sans-serif;color:var(--ink);}

  .toolbar{max-width:1400px;margin:0 auto;padding:16px 20px 0;}
  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
  .chip{flex-shrink:0;border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:8px 14px;font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;white-space:nowrap;transition:all .15s ease;}
  .chip.active{background:var(--primary);color:#fff;border-color:var(--primary);}
  .chip .count{opacity:.55;font-weight:500;margin-left:3px;}

  .stats{display:flex;gap:12px;overflow-x:auto;margin:16px 0 4px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch;}
  .stat{flex:0 0 auto;min-width:118px;background:var(--surface);border-radius:16px;padding:14px 18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;scroll-snap-align:start;overflow:hidden;}
  .stat-dot{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .stat-text{min-width:0;}
  .stat .num{font-size:19px;font-weight:800;line-height:1.25;white-space:nowrap;}
  .stat .lbl{font-size:11.5px;color:var(--ink-soft);margin-top:1px;white-space:nowrap;}

  select{border:1px solid var(--border);background:var(--surface);border-radius:11px;padding:9px 12px;font-size:12.5px;font-family:'Inter',sans-serif;color:var(--ink);outline:none;}

  .view-toggle{display:none;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:4px;margin-top:12px;width:fit-content;}
  .view-toggle button{border:none;background:transparent;border-radius:8px;padding:7px 16px;font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;font-family:'Inter',sans-serif;}
  .view-toggle button.active{background:var(--primary);color:#fff;}

  .split{max-width:1400px;margin:16px auto 40px;padding:0 20px;display:flex;gap:18px;align-items:flex-start;}
  .panel-list{flex:0 0 44%;display:flex;flex-direction:column;gap:12px;}
  .panel-map{flex:1;position:sticky;top:88px;height:calc(100vh - 110px);min-height:420px;border-radius:20px;overflow:hidden;box-shadow:var(--shadow);}
  #map{height:100%;width:100%;}

  .legend{position:absolute;bottom:16px;left:16px;z-index:400;background:rgba(255,255,255,0.94);backdrop-filter:blur(6px);border-radius:12px;padding:10px 14px;box-shadow:var(--shadow);font-size:11.5px;}
  .legend-row{display:flex;align-items:center;gap:7px;margin:3px 0;}
  .legend-dot{width:9px;height:9px;border-radius:50%;}

  .card{background:var(--surface);border-radius:16px;padding:14px 14px 14px 16px;box-shadow:var(--shadow);cursor:pointer;transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease;border:1px solid transparent;border-left-width:4px;border-left-style:solid;display:flex;gap:12px;}
  .card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
  .card.selected{border-color:var(--primary);}
  .card-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .card-body{flex:1;min-width:0;}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .card-top h3{font-size:14.5px;font-weight:700;margin:0;}
  .ref{font-size:10.5px;color:var(--ink-soft);}
  .pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;}
  .card-meta{display:flex;align-items:center;gap:5px;color:var(--ink-soft);font-size:12px;margin-top:5px;}
  .card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:9px;padding-top:9px;border-top:1px dashed var(--border);}
  .surface-txt{font-size:11.5px;color:var(--ink-soft);}
  .price{font-size:13.5px;font-weight:700;color:var(--gold);}

  .empty{background:var(--surface);border-radius:16px;padding:48px 20px;text-align:center;box-shadow:var(--shadow);}

  .overlay{position:fixed;inset:0;background:rgba(27,36,48,0.45);z-index:900;opacity:0;pointer-events:none;transition:opacity .2s ease;}
  .overlay.open{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:0;right:0;height:100%;width:420px;max-width:92vw;background:var(--surface);z-index:901;transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;box-shadow:var(--shadow-lg);border-radius:20px 0 0 20px;}
  .drawer.open{transform:translateX(0);}
  .drawer-banner{height:120px;display:flex;align-items:center;justify-content:center;position:relative;border-radius:20px 0 0 0;}
  .drawer-close{position:absolute;top:12px;right:12px;background:rgba(255,255,255,0.9);border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .drawer-content{padding:20px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
  .info-box{background:#F1EFE7;border-radius:12px;padding:11px 13px;}
  .info-box .k{font-size:10.5px;color:var(--ink-soft);display:flex;align-items:center;gap:5px;}
  .info-box .v{font-size:14px;font-weight:700;margin-top:3px;}

  .features{display:flex;gap:8px;margin-top:16px;}
  .feature{flex:1;background:#F1EFE7;border-radius:12px;padding:10px 6px;text-align:center;}
  .feature .fi{width:26px;height:26px;border-radius:8px;background:var(--primary);display:flex;align-items:center;justify-content:center;margin:0 auto 6px;}
  .feature .fv{font-size:15px;font-weight:800;font-family:'Manrope',sans-serif;}
  .feature .fl{font-size:9.5px;color:var(--ink-soft);margin-top:1px;}
  .section-title{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.04em;margin:18px 0 8px;}
  .tags{display:flex;flex-wrap:wrap;gap:6px;}
  .tag{background:#F1EFE7;border-radius:999px;padding:5px 11px;font-size:11.5px;font-weight:600;color:var(--ink);}

  .status-switch{display:flex;gap:8px;flex-wrap:wrap;}
  .status-btn{border:1.5px solid var(--sc);color:var(--sc);background:#fff;border-radius:999px;padding:7px 14px;font-size:11.5px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s ease;}
  .status-btn:hover{transform:translateY(-1px);}
  .status-btn.active{background:var(--sc);color:#fff;}

  .custom-marker{display:flex;align-items:center;justify-content:center;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.25);border:2.5px solid #fff;}
  .custom-marker.pulse{animation:pulse 1.1s ease-out infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(29,95,168,0.4),0 2px 8px rgba(0,0,0,0.25);}
    70%{box-shadow:0 0 0 14px rgba(29,95,168,0),0 2px 8px rgba(0,0,0,0.25);}
    100%{box-shadow:0 0 0 0 rgba(29,95,168,0),0 2px 8px rgba(0,0,0,0.25);}
  }
  @keyframes spin{
    to{transform:rotate(360deg);}
  }
  .leaflet-popup-content-wrapper{border-radius:12px;}
  .leaflet-popup-content{margin:12px 14px;}
  .popup-card{min-width:150px;}
  .popup-card .pt{font-family:'Manrope',sans-serif;font-weight:700;font-size:13px;color:var(--ink);margin:0 0 3px;}
  .popup-card .pm{font-size:11px;color:var(--ink-soft);}
  .popup-card .pp{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:13.5px;color:var(--gold);margin-top:5px;}
  .popup-card .plink{display:inline-block;margin-top:8px;font-size:11.5px;font-weight:700;color:var(--primary);cursor:pointer;}

  @media (max-width: 1023px){
    .panel-map{position:relative;top:0;height:min(60vh,480px);}
    .split{flex-direction:column;}
    .panel-list, .panel-map{flex:1 1 auto;width:100%;}
    .view-toggle{display:flex;}
    .split[data-view="list"] .panel-map{display:none;}
    .split[data-view="map"] .panel-list{display:none;}
  }

  @media (max-width: 680px){
    .header-inner{flex-wrap:wrap;padding:12px 16px;}
    .brand h1{font-size:15px;}
    .brand p{font-size:10px;}
    .searchbar{order:3;flex:1 1 100%;max-width:none;margin-top:2px;}
    .btn-label{display:none;}
    .btn-primary{padding:10px 12px;}
    .toolbar{padding:14px 16px 0;}
    .split{padding:0 16px;}
    .stat{padding:12px 14px;}
    .stat .num{font-size:16px;}
    .card{padding:12px 12px 12px 14px;gap:10px;}
    .card-icon{width:40px;height:40px;}
    .card-foot{flex-wrap:wrap;row-gap:4px;}
    .features{flex-wrap:wrap;}
    .feature{flex:1 1 40%;}
    .drawer{
      top:auto;bottom:0;right:0;left:0;width:100% !important;max-width:100% !important;
      height:92vh;border-radius:18px 18px 0 0;
      transform:translateY(100%);
    }
    .drawer.open{transform:translateY(0);}
    .status-btn{padding:9px 15px;min-height:40px;}
    .btn{min-height:44px;}
    .chip{padding:9px 14px;}
    .form-input, .form-select, .form-textarea{padding:11px 12px;font-size:14px;}
  }

  @media (max-width: 380px){
    .grid2{grid-template-columns:1fr;}
  }

  .auth-overlay{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  .auth-box{background:var(--surface);border-radius:20px;padding:32px 28px;width:100%;max-width:360px;box-shadow:var(--shadow-lg);}
  .auth-box h2{font-size:19px;margin:0 0 6px;}
  .auth-box p{font-size:12.5px;color:var(--ink-soft);margin:0 0 20px;}
  .auth-input{width:100%;border:1px solid var(--border);border-radius:11px;padding:11px 14px;font-size:13.5px;font-family:'Inter',sans-serif;color:var(--ink);outline:none;margin-bottom:10px;}
  .auth-input:focus{border-color:var(--primary);}
  .auth-error{color:var(--brick);font-size:12px;margin:8px 0 0;min-height:14px;}
  .btn-logout{background:none;border:none;color:var(--ink-soft);font-size:12px;font-weight:600;cursor:pointer;text-decoration:underline;font-family:'Inter',sans-serif;}

  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .form-field.full{grid-column:1/-1;}
  .form-label{font-size:11px;font-weight:700;color:var(--ink-soft);margin-bottom:4px;display:block;}
  .form-input, .form-select, .form-textarea{width:100%;border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;font-family:'Inter',sans-serif;color:var(--ink);outline:none;background:#fff;}
  .form-input:focus, .form-select:focus, .form-textarea:focus{border-color:var(--primary);}
  .form-textarea{resize:vertical;min-height:70px;}
  .form-error{color:var(--brick);font-size:12px;margin-top:10px;min-height:14px;}
  .toggle-row{display:flex;align-items:center;gap:8px;margin:14px 0 4px;}
  .photo-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .photo-thumb{position:relative;width:72px;height:72px;border-radius:10px;overflow:hidden;background:#F1EFE7;flex-shrink:0;}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .photo-thumb .rm{position:absolute;top:2px;right:2px;background:rgba(27,36,48,0.65);color:#fff;border:none;border-radius:50%;width:18px;height:18px;font-size:12px;line-height:1;cursor:pointer;}
  .photo-thumb .cov-badge{position:absolute;bottom:2px;left:2px;background:var(--primary);color:#fff;font-size:8px;font-weight:700;padding:2px 5px;border-radius:5px;}
  .photo-add-btn{width:72px;height:72px;border-radius:10px;border:1.5px dashed var(--border);background:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);flex-shrink:0;}
  .photo-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(86px,1fr));gap:8px;margin-top:8px;}
  .photo-strip .thumb-btn{position:relative;width:100%;aspect-ratio:4/3;border:none;padding:0;border-radius:12px;overflow:hidden;cursor:pointer;background:#F1EFE7;box-shadow:inset 0 0 0 1px var(--border);}
  .photo-strip .thumb-btn img{width:100%;height:100%;object-fit:cover;display:block;}
  .photo-strip .thumb-btn .thumb-count{position:absolute;inset:0;background:rgba(27,36,48,0.35);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;}
  .gallery-modal{position:fixed;inset:0;background:rgba(27,36,48,0.83);z-index:1100;display:flex;align-items:center;justify-content:center;padding:20px;}
  .gallery-modal.hidden{display:none;}
  .gallery-shell{width:min(940px,100%);background:#fff;border-radius:20px;overflow:hidden;box-shadow:var(--shadow-lg);}
  .gallery-main{position:relative;display:flex;align-items:center;justify-content:center;min-height:420px;background:#111;padding:16px;}
  .gallery-main img{max-width:100%;max-height:62vh;object-fit:contain;border-radius:12px;}
  .gallery-nav,.gallery-close{position:absolute;border:none;cursor:pointer;background:rgba(255,255,255,0.92);color:var(--ink);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);font-size:20px;}
  .gallery-nav{top:50%;transform:translateY(-50%);} .gallery-nav.prev{left:14px;} .gallery-nav.next{right:14px;}
  .gallery-close{top:14px;right:14px;}
  .gallery-counter{position:absolute;left:14px;bottom:14px;background:rgba(27,36,48,0.72);color:#fff;padding:6px 10px;border-radius:999px;font-size:11px;font-weight:700;}
  .gallery-thumbs{display:flex;gap:8px;padding:12px;overflow-x:auto;background:#F7F6F2;}
  .gallery-thumbs button{border:2px solid transparent;border-radius:10px;padding:0;width:74px;height:56px;overflow:hidden;cursor:pointer;background:#fff;flex-shrink:0;}
  .gallery-thumbs button.active{border-color:var(--primary);} .gallery-thumbs img{width:100%;height:100%;object-fit:cover;display:block;}

  /* --- Boîte de réception --- */
  .btn-inbox{position:relative;background:var(--surface);border:1px solid var(--border);color:var(--ink);}
  .btn-inbox:hover{background:#F1EFE7;}
  .inbox-badge{position:absolute;top:-6px;right:-6px;background:var(--brick);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 4px;}
  .inbox-tabs{display:flex;gap:6px;padding:16px 20px 0;}
  .inbox-tab{flex:1;border:1px solid var(--border);background:var(--surface);border-radius:11px;padding:9px 8px;font-size:12.5px;font-weight:600;color:var(--ink-soft);cursor:pointer;font-family:'Inter',sans-serif;}
  .inbox-tab.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .inbox-list{padding:14px 20px 24px;display:flex;flex-direction:column;gap:10px;}
  .inbox-item{background:#F1EFE7;border-radius:14px;padding:13px 14px;}
  .inbox-item.unread{box-shadow:inset 0 0 0 2px var(--primary);}
  .inbox-item .ii-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .inbox-item .ii-name{font-weight:700;font-size:13.5px;}
  .inbox-item .ii-date{font-size:10.5px;color:var(--ink-soft);white-space:nowrap;}
  .inbox-item .ii-contact{font-size:12px;color:var(--primary);margin-top:2px;}
  .inbox-item .ii-body{font-size:12.5px;margin-top:8px;line-height:1.5;}
  .inbox-item .ii-ref{font-size:11px;color:var(--ink-soft);margin-top:6px;}
  .inbox-item .ii-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .inbox-item .ii-actions button, .inbox-item .ii-actions select{border:1px solid var(--border);background:#fff;border-radius:8px;padding:5px 10px;font-size:11.5px;font-weight:600;cursor:pointer;color:var(--ink);font-family:'Inter',sans-serif;}
  .inbox-empty{padding:40px 20px;text-align:center;color:var(--ink-soft);font-size:13px;}
</style>
</head>
<body>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <h2>Connexion</h2>
    <p>Espace privé — connectez-vous avec le compte créé dans Supabase Authentication.</p>
    <input class="auth-input" id="authEmail" type="email" placeholder="Email" />
    <input class="auth-input" id="authPassword" type="password" placeholder="Mot de passe" />
    <button class="btn btn-primary" id="authSubmit" style="width:100%;justify-content:center;">Se connecter</button>
    <p class="auth-error" id="authError"></p>
  </div>
</div>

<header>

  <div class="chips" id="chips"></div>
  <div class="stats" id="stats"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
    <div class="view-toggle" id="viewToggle">
      <button data-view="list" class="active">Liste</button>
      <button data-view="map">Carte</button>
    </div>
    <select id="statusFilter" style="margin-top:12px;">
      <option value="Tous">Tous les statuts</option>
      <option value="Disponible">Disponible</option>
      <option value="Réservé">Réservé</option>
      <option value="Vendu">Vendu</option>
      <option value="Loué">Loué</option>
    </select>
  </div>
</div>

<div class="split" id="split" data-view="list">
  <div class="panel-list" id="list"></div>
  <div class="panel-map">
    <div id="map"></div>
    <div class="legend">
      <div class="legend-row"><span class="legend-dot" style="background:#B24A2C"></span>Terrain</div>
      <div class="legend-row"><span class="legend-dot" style="background:#2E4A61"></span>Maison</div>
      <div class="legend-row"><span class="legend-dot" style="background:#1F7A73"></span>Appartement</div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="drawer" id="drawer"></div>
<div class="overlay" id="formOverlay"></div>
<div class="drawer" id="formDrawerPanel" style="width:480px;"></div>
<div class="gallery-modal hidden" id="galleryModal"></div>

<div class="overlay" id="inboxOverlay"></div>
<div class="drawer" id="inboxDrawer" style="width:460px;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const TYPE_COLOR = { Terrain:'#B24A2C', Maison:'#2E4A61', Appartement:'#1F7A73' };
const STATUS_COLOR = { Disponible:'#3F7A49', 'Réservé':'#B8842A', Vendu:'#8B9199', 'Loué':'#8B9199' };
const STATUS_OPTIONS = { Vente:['Disponible','Réservé','Vendu'], Location:['Disponible','Réservé','Loué'] };
const ICON_SVG = {
  Terrain: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="12" x2="21" y2="12"/></svg>',
  Maison: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>',
  Appartement: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="4" y="3" width="16" height="18"/><line x1="9" y1="8" x2="9" y2="8"/><line x1="15" y1="8" x2="15" y2="8"/><line x1="9" y1="13" x2="9" y2="13"/><line x1="15" y1="13" x2="15" y2="13"/></svg>'
};

// ===== CONFIGURATION SUPABASE =====
// Remplacez ces deux valeurs par celles de VOTRE projet
// (Dashboard Supabase > Project Settings > API Keys)
const SUPABASE_URL = 'https://avanktgaxepzpqmsiauz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_nAQnS82ru9h-beIDPKMqPA_JO_aSYc-'; // clé "publishable" (ou "anon" pour les anciens projets)
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// UUID de VOTRE compte (administrateur) — même valeur que dans schema_comptes_collaborateurs.sql.
// Sert uniquement à afficher ou masquer le bouton "Boîte de réception" selon qui est connecté.
const ADMIN_ID = '514ff065-fa33-454b-9701-c9aec9053862';

let PROPERTIES = [];
let IS_ADMIN = false;
let COLLABORATORS = {}; // { user_id: display_name } — chargé uniquement pour l'admin

async function loadCollaborators(){
  const { data } = await db.from('collaborators').select('*');
  COLLABORATORS = {};
  (data || []).forEach(c => { COLLABORATORS[c.user_id] = c.display_name; });
}
function ownerLabel(ownerId){
  if(ownerId === ADMIN_ID) return 'Vous';
  return COLLABORATORS[ownerId] || 'Collaborateur (non nommé)';
}

function mapRow(r){
  return {
    id: r.id, ref: r.ref, type: r.type, operation: r.operation,
    commune: r.commune, region: r.region, surface: Number(r.surface), price: Number(r.price),
    status: r.status, desc: r.description || '', lat: Number(r.lat), lng: Number(r.lng),
    date: r.date_acquisition || '',
    is_published: !!r.is_published,
    owner_id: r.owner_id,
    photos: r.property_photos || [],
    rooms: (r.chambres != null) ? { chambres:r.chambres, salons:r.salons, sdb:r.salles_bain, cuisine:r.cuisine, autres:r.equipements || [] } : null
  };
}

function publicPhotoUrl(path){
  return db.storage.from('property-photos').getPublicUrl(path).data.publicUrl;
}
function coverUrl(p){
  if(!p.photos || !p.photos.length) return null;
  const cover = p.photos.find(ph=>ph.is_cover) || p.photos[0];
  return publicPhotoUrl(cover.storage_path);
}

async function loadProperties(){
  document.getElementById('list').innerHTML = `<div class="empty"><p style="margin:0;color:var(--ink-soft);font-size:13px;">Chargement de vos biens…</p></div>`;
  const { data, error } = await db.from('properties')
    .select('*, property_photos(*)')
    .order('created_at', { ascending:false })
    .order('position', { foreignTable:'property_photos', ascending:true });
  if(error){
    document.getElementById('list').innerHTML = `<div class="empty"><h3 style="margin:0 0 6px;font-size:15px;">Connexion à Supabase impossible</h3><p style="margin:0;color:var(--ink-soft);font-size:12.5px;">${error.message}</p></div>`;
    return;
  }
  PROPERTIES = (data || []).map(mapRow);
  renderStats();
  render();
}

const fcfa = n => n.toLocaleString('fr-FR') + ' FCFA';
let state = { type:'Tous', status:'Tous', search:'', selected:null };
let markers = {};

// ---- Carte ----
const map = L.map('map', { zoomControl:true }).setView([14.72,-17.15], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors', maxZoom:19, subdomains:'abc'
}).addTo(map);

function markerIcon(p, selected){
  return L.divIcon({
    className:'',
    html:`<div class="custom-marker ${selected?'pulse':''}" style="width:${selected?38:32}px;height:${selected?38:32}px;background:${TYPE_COLOR[p.type]}">${ICON_SVG[p.type]}</div>`,
    iconSize:[selected?38:32, selected?38:32],
    iconAnchor:[selected?19:16, selected?19:16]
  });
}

function popupContent(p){
  return `<div class="popup-card">
    <div class="pt">${p.type} — ${p.commune}</div>
    <div class="pm">${p.surface} m²${p.rooms ? ' · '+p.rooms.chambres+' ch. · '+p.rooms.sdb+' sdb' : ''}</div>
    <div class="pp">${fcfa(p.price)}${p.operation==='Location'?' /mois':''}</div>
    <span class="pill" style="background:${STATUS_COLOR[p.status]}22;color:${STATUS_COLOR[p.status]};display:inline-block;margin-top:6px;">${p.status}</span><br/>
    <a class="plink" onclick="openDrawerById('${p.id}')">Voir la fiche complète →</a>
  </div>`;
}
function openDrawerById(id){
  const p = PROPERTIES.find(x=>String(x.id)===String(id));
  if(p){ openDrawer(p); highlightCard(p.id); map.closePopup(); }
}

function rebuildMarkers(list){
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  list.forEach(p => {
    const m = L.marker([p.lat,p.lng], { icon: markerIcon(p, String(p.id)===String(state.selected)) });
    m.bindPopup(popupContent(p), { maxWidth:220 });
    m.on('click', () => { highlightCard(p.id); });
    m.addTo(map);
    markers[p.id] = m;
  });
}

// ---- Filtrage ----
function filtered(){
  return PROPERTIES.filter(p=>{
    if(state.type!=='Tous' && p.type!==state.type) return false;
    if(state.status!=='Tous' && p.status!==state.status) return false;
    if(state.search){
      const q=state.search.toLowerCase();
      if(!(p.commune.toLowerCase().includes(q)||p.region.toLowerCase().includes(q)||p.ref.toLowerCase().includes(q))) return false;
    }
    return true;
  });
}

// ---- Chips ----
const NAV = [['Tous','Tous'],['Terrain','Terrains'],['Maison','Maisons'],['Appartement','Appartements']];
function renderChips(){
  const counts = {Terrain:0,Maison:0,Appartement:0};
  PROPERTIES.forEach(p=>counts[p.type]++);
  const el = document.getElementById('chips');
  el.innerHTML = NAV.map(([key,label])=>{
    const c = key==='Tous' ? PROPERTIES.length : counts[key];
    return `<button class="chip ${state.type===key?'active':''}" data-type="${key}">${label} <span class="count">${c}</span></button>`;
  }).join('');
  el.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{ state.type=b.dataset.type; render(); });
}

// ---- Stats ----
function renderStats(){
  const total = PROPERTIES.length;
  const dispo = PROPERTIES.filter(p=>p.status==='Disponible').length;
  const res = PROPERTIES.filter(p=>p.status==='Réservé').length;
  const clot = PROPERTIES.filter(p=>p.status==='Vendu'||p.status==='Loué').length;
  const valeur = PROPERTIES.filter(p=>p.operation==='Vente').reduce((s,p)=>s+p.price,0);
  const items = [
    ['Biens au total', total, '#1B4F91'],
    ['Disponibles', dispo, '#3F7A49'],
    ['Réservés', res, '#B8842A'],
    ['Vendus / Loués', clot, '#8B9199'],
    ['Valeur (ventes)', fcfa(valeur), '#B24A2C'],
  ];
  document.getElementById('stats').innerHTML = items.map(([lbl,val,col])=>`
    <div class="stat">
      <div class="stat-dot" style="background:${col}22"></div>
      <div class="stat-text"><div class="num mono" style="color:${col}">${val}</div><div class="lbl">${lbl}</div></div>
    </div>`).join('');
}

// ---- Liste ----
function renderList(){
  const items = filtered();
  const el = document.getElementById('list');
  if(items.length===0){
    el.innerHTML = `<div class="empty"><h3 style="margin:0 0 6px;font-size:15px;">Aucun bien ne correspond</h3><p style="margin:0;color:var(--ink-soft);font-size:12.5px;">Essayez d'élargir la recherche ou de changer de filtre.</p></div>`;
    return;
  }
  el.innerHTML = items.map(p=>{
    const cover = coverUrl(p);
    return `
    <div class="card ${String(state.selected)===String(p.id)?'selected':''}" data-id="${p.id}" style="border-left-color:${STATUS_COLOR[p.status]}">
      <div class="card-icon" style="background:${cover?`center/cover no-repeat url('${cover}')`:TYPE_COLOR[p.type]}">${cover?'':ICON_SVG[p.type]}</div>
      <div class="card-body">
        <div class="card-top">
          <div>
            <div class="ref mono">${p.ref}</div>
            <h3>${p.type} — ${p.commune}</h3>
          </div>
          <span class="pill" style="background:${STATUS_COLOR[p.status]}22;color:${STATUS_COLOR[p.status]}">${p.status}</span>
        </div>
        <div class="card-meta">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#5C6470" stroke-width="2"><path d="M21 10c0 6-9 12-9 12s-9-6-9-12a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span>${p.region}</span>
          ${p.rooms ? `<span style="margin:0 2px;">·</span><span>${p.rooms.chambres} ch. · ${p.rooms.salons} salon${p.rooms.salons>1?'s':''} · ${p.rooms.sdb} sdb</span>` : ''}
        </div>
        ${IS_ADMIN ? `<div class="card-meta" style="margin-top:3px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#5C6470" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Ajouté par ${ownerLabel(p.owner_id)}</span></div>` : ''}
        <div class="card-foot">
          <span class="surface-txt mono">${p.surface} m²</span>
          <span class="price mono">${fcfa(p.price)}${p.operation==='Location'?' /mois':''}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  el.querySelectorAll('.card').forEach(c=>{
    c.onclick=()=>{
      const p = PROPERTIES.find(x=>String(x.id)===String(c.dataset.id));
      openDrawer(p);
      state.selected = p.id;
      renderList();
      rebuildMarkers(filtered());
      map.flyTo([p.lat,p.lng], 12, {duration:0.6});
    };
  });
}
function highlightCard(id){
  state.selected = id;
  renderList();
  rebuildMarkers(filtered());
}

// ---- Drawer détail ----
function getPropertyPhotos(p){
  const photos = Array.isArray(p.photos) ? [...p.photos] : [];
  return photos
    .map(ph => ({ ...ph, url: publicPhotoUrl(ph.storage_path) }))
    .sort((a,b) => (a.position ?? 0) - (b.position ?? 0));
}

function openPhotoGallery(p, startIndex = 0){
  const photos = getPropertyPhotos(p);
  if(!photos.length) return;
  const modal = document.getElementById('galleryModal');
  let currentIndex = Math.max(0, Math.min(startIndex, photos.length - 1));

  function renderGallery(){
    const current = photos[currentIndex];
    modal.innerHTML = `
      <div class="gallery-shell">
        <div class="gallery-main">
          <button type="button" class="gallery-nav prev" data-action="prev" ${currentIndex===0?'disabled':''}>‹</button>
          <img src="${current.url}" alt="Photo ${currentIndex + 1}" />
          <button type="button" class="gallery-nav next" data-action="next" ${currentIndex===photos.length - 1?'disabled':''}>›</button>
          <button type="button" class="gallery-close" data-action="close">×</button>
          <div class="gallery-counter">${currentIndex + 1}/${photos.length}</div>
        </div>
        <div class="gallery-thumbs">
          ${photos.map((ph, idx) => `<button type="button" class="${idx===currentIndex?'active':''}" data-index="${idx}"><img src="${ph.url}" alt="Miniature ${idx + 1}" /></button>`).join('')}
        </div>
      </div>`;

    modal.querySelector('[data-action="prev"]').onclick = () => { currentIndex = Math.max(0, currentIndex - 1); renderGallery(); };
    modal.querySelector('[data-action="next"]').onclick = () => { currentIndex = Math.min(photos.length - 1, currentIndex + 1); renderGallery(); };
    modal.querySelector('[data-action="close"]').onclick = closePhotoGallery;
    modal.querySelectorAll('[data-index]').forEach(btn => {
      btn.onclick = () => { currentIndex = Number(btn.dataset.index); renderGallery(); };
    });
  }

  renderGallery();
  modal.classList.remove('hidden');
  document.body.style.overflow = 'hidden';
  modal.onclick = (e) => { if(e.target === modal) closePhotoGallery(); };
}

function closePhotoGallery(){
  const modal = document.getElementById('galleryModal');
  modal.classList.add('hidden');
  modal.innerHTML = '';
  document.body.style.overflow = '';
}

function openDrawer(p){
  state.selected = p.id;
  const cover = coverUrl(p);
  const photos = getPropertyPhotos(p);
  const d = document.getElementById('drawer');
  d.innerHTML = `
    <div class="drawer-banner" style="background:${cover?`center/cover no-repeat url('${cover}')`:`linear-gradient(135deg, ${TYPE_COLOR[p.type]}, #161B22)`}">
      ${cover?'':ICON_SVG[p.type].replace('width="18" height="18"','width="30" height="30"')}
      <button class="drawer-close" id="drawerClose">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#161B22" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <span class="pill" style="position:absolute;left:16px;bottom:-13px;background:${STATUS_COLOR[p.status]};color:#fff;box-shadow:var(--shadow)">${p.status}</span>
    </div>
    <div class="drawer-content">
      <div class="ref mono" style="margin-top:6px;">${p.ref}</div>
      <h2 style="font-size:20px;margin:4px 0 2px;">${p.type} — ${p.commune}</h2>
      <div class="card-meta"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#5C6470" stroke-width="2"><path d="M21 10c0 6-9 12-9 12s-9-6-9-12a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg><span>${p.commune}, région de ${p.region}</span></div>
      ${IS_ADMIN ? `<div class="card-meta" style="margin-top:4px;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#5C6470" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Ajouté par <strong>${ownerLabel(p.owner_id)}</strong></span></div>` : ''}
      <p style="font-size:13.5px;line-height:1.6;margin-top:14px;">${p.desc}</p>
      ${photos.length ? `
      <div class="section-title">Photos</div>
      <div class="photo-strip">
        ${photos.map((ph, idx) => `
          <button type="button" class="thumb-btn" data-open-gallery="${idx}">
            <img src="${ph.url}" alt="Photo ${idx + 1}" />
            ${idx === 0 && photos.length > 1 ? `<span class="thumb-count">+${photos.length - 1}</span>` : ''}
          </button>`).join('')}
      </div>` : ''}
      <div class="section-title">Statut du bien</div>
      <div class="status-switch">
        ${STATUS_OPTIONS[p.operation].map(s=>`<button class="status-btn ${p.status===s?'active':''}" style="--sc:${STATUS_COLOR[s]}" data-status="${s}">${s}</button>`).join('')}
      </div>
      <div class="grid2">
        <div class="info-box"><div class="k">Superficie</div><div class="v mono">${p.surface} m²</div></div>
        <div class="info-box"><div class="k">${p.operation}</div><div class="v mono" style="color:var(--gold)">${fcfa(p.price)}${p.operation==='Location'?'/mois':''}</div></div>
        <div class="info-box"><div class="k">Ajouté le</div><div class="v mono" style="font-size:12.5px">${p.date}</div></div>
        <div class="info-box"><div class="k">Statut</div><div class="v mono" style="color:${STATUS_COLOR[p.status]};font-size:12.5px">${p.status}</div></div>
      </div>
      ${p.rooms ? `
      <div class="section-title">Caractéristiques</div>
      <div class="features">
        <div class="feature">
          <div class="fi"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M3 18v-6a2 2 0 012-2h14a2 2 0 012 2v6"/><path d="M3 18h18"/><path d="M5 10V6a2 2 0 012-2h2a2 2 0 012 2v4"/></svg></div>
          <div class="fv">${p.rooms.chambres}</div><div class="fl">Chambre${p.rooms.chambres>1?'s':''}</div>
        </div>
        <div class="feature">
          <div class="fi"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M20 9V7a2 2 0 00-2-2H6a2 2 0 00-2 2v2"/><path d="M2 11h20v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5z"/><path d="M4 17v3M20 17v3"/></svg></div>
          <div class="fv">${p.rooms.salons}</div><div class="fl">Salon${p.rooms.salons>1?'s':''}</div>
        </div>
        <div class="feature">
          <div class="fi"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M9 6L6.5 3.5a1.5 1.5 0 00-2.5 1V11"/><path d="M2 11h20v3a5 5 0 01-5 5H7a5 5 0 01-5-5v-3z"/><path d="M6 19v2M18 19v2"/></svg></div>
          <div class="fv">${p.rooms.sdb}</div><div class="fl">Salle${p.rooms.sdb>1?'s':''} de bain</div>
        </div>
        <div class="feature">
          <div class="fi"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M3 2v7c0 1.1.9 2 2 2h1a2 2 0 002-2V2"/><path d="M5 9v13"/><path d="M18 2c-1.5 2-1.5 5 0 7v11"/></svg></div>
          <div class="fv" style="font-size:11.5px;">${p.rooms.cuisine}</div><div class="fl">Cuisine</div>
        </div>
      </div>
      ${p.rooms.autres && p.rooms.autres.length ? `<div class="tags" style="margin-top:10px;">${p.rooms.autres.map(a=>`<span class="tag">${a}</span>`).join('')}</div>` : ''}
      ` : ''}
      <div style="display:flex;gap:8px;margin-top:16px;">
        <button class="btn btn-primary" id="editPropertyBtn" style="flex:1;justify-content:center;">Modifier</button>
        <button class="btn btn-danger" id="deletePropertyBtn" style="flex:1;justify-content:center;">Supprimer</button>
      </div>
      <p style="font-size:11px;color:var(--ink-soft);font-style:italic;margin-top:18px;">Espace privé — cette fiche ne serait visible dans la vitrine client que si vous choisissez de la publier.</p>
    </div>`;
  document.getElementById('drawerClose').onclick = closeDrawer;
  document.getElementById('editPropertyBtn').onclick = () => { closeDrawer(); openForm(p); };
  document.getElementById('deletePropertyBtn').onclick = () => deleteProperty(p);
  d.querySelectorAll('.status-btn').forEach(btn=>{
    btn.onclick = () => changeStatus(p.id, btn.dataset.status);
  });
  d.querySelectorAll('[data-open-gallery]').forEach(btn=>{
    btn.onclick = () => openPhotoGallery(p, Number(btn.dataset.openGallery));
  });
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
}
async function deleteProperty(prop){
  if(!confirm('Confirmer la suppression de ce bien ? Cette action est irréversible.')) return;
  if(prop.photos && prop.photos.length){
    await db.storage.from('property-photos').remove(prop.photos.map(ph=>ph.storage_path));
  }
  const { error } = await db.from('properties').delete().eq('id', prop.id);
  if(error){
    alert('Suppression impossible : ' + error.message);
    return;
  }
  PROPERTIES = PROPERTIES.filter(p=>String(p.id)!==String(prop.id));
  state.selected = null;
  renderStats();
  render();
  closeDrawer();
}
async function changeStatus(id, newStatus){
  const prop = PROPERTIES.find(x=>String(x.id)===String(id));
  if(!prop || prop.status===newStatus) return;

  const { data, error } = await db.from('properties').update({ status:newStatus }).eq('id', prop.id).select('*, property_photos(*)').single();
  if(error){
    console.error('Erreur mise à jour statut:', error);
    alert("La mise à jour du statut a échoué : " + error.message);
    return;
  }
  if(!data){
    alert("La mise à jour du statut a échoué : aucune donnée retournée.");
    return;
  }

  const updated = mapRow(data);
  Object.assign(prop, updated);
  renderStats();
  render();
  openDrawer(prop);
}

function renderPhotoGrid(){
  const el = document.getElementById('photoGrid');
  const existingHtml = editingPhotos.map(ph => `
    <div class="photo-thumb">
      <img src="${publicPhotoUrl(ph.storage_path)}" />
      ${ph.is_cover ? '<span class="cov-badge">Couverture</span>' : ''}
      <button type="button" class="rm" data-remove-existing="${ph.id}">×</button>
    </div>`).join('');
  const pendingHtml = pendingFiles.map((pf,i) => `
    <div class="photo-thumb">
      <img src="${pf.previewUrl}" />
      <button type="button" class="rm" data-remove-pending="${i}">×</button>
    </div>`).join('');
  el.innerHTML = existingHtml + pendingHtml + `
    <button type="button" class="photo-add-btn" id="photoAddBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5C6470" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>`;
  document.getElementById('photoAddBtn').onclick = () => document.getElementById('photoInput').click();
  el.querySelectorAll('[data-remove-pending]').forEach(b=>{
    b.onclick = () => { pendingFiles.splice(Number(b.dataset.removePending),1); renderPhotoGrid(); };
  });
  el.querySelectorAll('[data-remove-existing]').forEach(b=>{
    b.onclick = async () => {
      if(!confirm('Supprimer cette photo ?')) return;
      const id = b.dataset.removeExisting;
      const ph = editingPhotos.find(x=>String(x.id)===String(id));
      if(!ph) return;
      b.disabled = true;
      await db.storage.from('property-photos').remove([ph.storage_path]);
      await db.from('property_photos').delete().eq('id', id);
      editingPhotos = editingPhotos.filter(x=>String(x.id)!==String(id));
      // Trier par position pour s'assurer que l'ordre est correct
      editingPhotos.sort((a, b) => (a.position ?? 0) - (b.position ?? 0));
      // Recalculer les positions des photos restantes
      for(let idx=0; idx<editingPhotos.length; idx++){
        if(editingPhotos[idx].position !== idx){
          await db.from('property_photos').update({ position: idx }).eq('id', editingPhotos[idx].id);
          editingPhotos[idx].position = idx;
        }
      }
      renderPhotoGrid();
    };
  });
}

let formMapInstance = null;
let formMarker = null;

function setFormLatLng(lat, lng){
  document.getElementById('f_lat').value = lat.toFixed(6);
  document.getElementById('f_lng').value = lng.toFixed(6);
}

function initFormMap(lat, lng){
  if(formMapInstance){ formMapInstance.remove(); formMapInstance = null; }
  const hasCoords = !isNaN(lat) && !isNaN(lng);
  const startLat = hasCoords ? lat : 14.6928; // Dakar par défaut
  const startLng = hasCoords ? lng : -17.4467;
  formMapInstance = L.map('formMap', { zoomControl:true }).setView([startLat, startLng], hasCoords ? 14 : 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors', maxZoom:19, subdomains:'abc'
  }).addTo(formMapInstance);
  formMarker = L.marker([startLat, startLng], { draggable:true }).addTo(formMapInstance);
  formMarker.on('dragend', () => {
    const pos = formMarker.getLatLng();
    setFormLatLng(pos.lat, pos.lng);
  });
  formMapInstance.on('click', (e) => {
    formMarker.setLatLng(e.latlng);
    setFormLatLng(e.latlng.lat, e.latlng.lng);
  });
  setTimeout(()=>formMapInstance.invalidateSize(), 200);
}

async function geocodeSearch(){
  const query = document.getElementById('f_geocode').value.trim();
  if(!query) return;
  const btn = document.getElementById('f_geocodeBtn');
  const original = btn.textContent;
  btn.disabled = true; btn.textContent = '…';
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&countrycodes=sn&limit=1&q=${encodeURIComponent(query)}`);
    const results = await res.json();
    if(results && results[0]){
      const lat = parseFloat(results[0].lat);
      const lng = parseFloat(results[0].lon);
      setFormLatLng(lat, lng);
      formMarker.setLatLng([lat, lng]);
      formMapInstance.setView([lat, lng], 14);
    } else {
      alert("Aucun résultat trouvé pour cette recherche. Essayez un nom de lieu plus général (ex: la commune seule).");
    }
  } catch(err){
    alert("La recherche a échoué — vérifiez votre connexion internet.");
  }
  btn.disabled = false; btn.textContent = original;
}

function useCurrentPosition(){
  if(!navigator.geolocation){ alert("La géolocalisation n'est pas disponible sur cet appareil."); return; }
  
  const btn = document.getElementById('f_geoBtn');
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite;"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 10 10"/></svg><span id="f_geoBtnText">…</span>';
  
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      const { latitude, longitude } = pos.coords;
      setFormLatLng(latitude, longitude);
      formMarker.setLatLng([latitude, longitude]);
      formMapInstance.setView([latitude, longitude], 16);
      btn.disabled = false;
      btn.innerHTML = originalText;
      const msg = document.createElement('div');
      msg.style.cssText = 'position:fixed;top:20px;right:20px;background:#3F7A49;color:#fff;padding:12px 16px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;box-shadow:var(--shadow-lg)';
      msg.textContent = '✓ Position capturée avec succès';
      document.body.appendChild(msg);
      setTimeout(() => msg.remove(), 3000);
    },
    (err) => {
      btn.disabled = false;
      btn.innerHTML = originalText;
      let message = "Impossible d'obtenir votre position (autorisation refusée ou signal indisponible).";
      if(err.code === 1) message = "Veuillez autoriser la géolocalisation pour utiliser cette fonction.";
      else if(err.code === 3) message = "La géolocalisation a pris trop de temps. Vérifiez votre signal GPS.";
      alert(message);
    },
    { enableHighAccuracy:true, timeout:10000 }
  );
}

async function saveProperty(existing){
  const errEl = document.getElementById('formError');
  errEl.textContent = '';

  const type = document.getElementById('f_type').value;
  const operation = document.getElementById('f_operation').value;
  const payload = {
    ref: document.getElementById('f_ref').value.trim(),
    type, operation,
    status: document.getElementById('f_status').value,
    commune: document.getElementById('f_commune').value.trim(),
    region: document.getElementById('f_region').value.trim(),
    lat: parseFloat(document.getElementById('f_lat').value),
    lng: parseFloat(document.getElementById('f_lng').value),
    surface: parseFloat(document.getElementById('f_surface').value),
    price: parseFloat(document.getElementById('f_price').value),
    description: document.getElementById('f_desc').value.trim() || null,
    is_published: document.getElementById('f_published').checked,
    chambres: null, salons: null, salles_bain: null, cuisine: null, equipements: null
  };

  if(!payload.ref || !payload.commune || !payload.region || isNaN(payload.lat) || isNaN(payload.lng) || isNaN(payload.surface) || isNaN(payload.price)){
    errEl.textContent = 'Merci de renseigner tous les champs obligatoires (référence, commune, région, latitude, longitude, superficie, prix).';
    return;
  }

  if(type !== 'Terrain'){
    const chambres = document.getElementById('f_chambres').value;
    const salons = document.getElementById('f_salons').value;
    const sdb = document.getElementById('f_sdb').value;
    const equip = document.getElementById('f_equip').value;
    payload.chambres = chambres ? parseInt(chambres) : null;
    payload.salons = salons ? parseInt(salons) : null;
    payload.salles_bain = sdb ? parseInt(sdb) : null;
    payload.cuisine = document.getElementById('f_cuisine').value;
    payload.equipements = equip ? equip.split(',').map(e=>e.trim()).filter(Boolean) : null;
  }

  const saveBtn = document.getElementById('formSave');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Enregistrement…';

  let propertyId;
  if(existing){
    const { data, error } = await db.from('properties').update(payload).eq('id', existing.id).select().single();
    if(error){ errEl.textContent = "Échec de l'enregistrement : " + error.message; saveBtn.disabled=false; saveBtn.textContent='Enregistrer les modifications'; return; }
    propertyId = data.id;
  } else {
    const { data, error } = await db.from('properties').insert(payload).select().single();
    if(error){ errEl.textContent = "Échec de l'enregistrement : " + error.message; saveBtn.disabled=false; saveBtn.textContent='Ajouter ce bien'; return; }
    propertyId = data.id;
  }

  if(pendingFiles.length){
    const hadNoPhotos = editingPhotos.length === 0;
    let photoErrors = [];
    for(let i=0;i<pendingFiles.length;i++){
      const file = pendingFiles[i].file;
      const safeName = file.name
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')   // enlève les accents
        .replace(/[^a-zA-Z0-9.\-_]/g, '_');                  // remplace espaces/parenthèses/etc.
      const path = `${propertyId}/${Date.now()}-${i}-${safeName}`;
      const { error: upErr } = await db.storage.from('property-photos').upload(path, file);
      if(upErr){
        console.error('Upload photo échoué:', upErr);
        photoErrors.push(`${file.name}: ${upErr.message}`);
        continue;
      }
      const { error: insertErr } = await db.from('property_photos').insert({
        property_id: propertyId,
        storage_path: path,
        position: editingPhotos.length + i,
        is_cover: hadNoPhotos && i===0
      });
      if(insertErr){
        console.error('Insertion métadonnée photo échouée:', insertErr);
        photoErrors.push(`Métadonnée de ${file.name}: ${insertErr.message}`);
      }
    }
    if(photoErrors.length){
      // Le bien est bien enregistré ; seules certaines photos ont échoué.
      // On referme quand même (pas de renvoi en double possible) et on alerte clairement.
      alert("Le bien a été enregistré, mais certaines photos n'ont pas pu être importées :\n\n" + photoErrors.join('\n') + "\n\nVous pouvez réessayer de les ajouter via 'Modifier'.");
    }
  }

  closeForm();
  await loadProperties();
}

let INBOX = { messages: [], appointments: [], alerts: [] };
let inboxTab = 'messages';

function fmtDate(iso){
  return new Date(iso).toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}

async function loadInboxCounts(){
  const [{ count: unreadMsgs }, { count: pendingRdv }] = await Promise.all([
    db.from('contact_messages').select('id', { count:'exact', head:true }).eq('is_read', false),
    db.from('appointments').select('id', { count:'exact', head:true }).eq('status', 'En attente')
  ]);
  const total = (unreadMsgs||0) + (pendingRdv||0);
  const badge = document.getElementById('inboxBadge');
  if(total > 0){ badge.style.display='flex'; badge.textContent = total; } else { badge.style.display='none'; }
}

async function loadInboxData(){
  const [{data:msgs}, {data:apts}, {data:alerts}] = await Promise.all([
    db.from('contact_messages').select('*, properties(ref, commune, type)').order('created_at', {ascending:false}),
    db.from('appointments').select('*, properties(ref, commune, type)').order('created_at', {ascending:false}),
    db.from('alert_subscriptions').select('*').order('created_at', {ascending:false})
  ]);
  INBOX.messages = msgs || [];
  INBOX.appointments = apts || [];
  INBOX.alerts = alerts || [];

function renderInboxList(){
  const el = document.getElementById('inboxList');
  if(inboxTab === 'messages'){
    if(!INBOX.messages.length){ el.innerHTML = '<div class="inbox-empty">Aucun message pour l’instant.</div>'; return; }
    el.innerHTML = INBOX.messages.map(m => `
      <div class="inbox-item ${!m.is_read?'unread':''}" data-id="${m.id}">
        <div class="ii-top"><span class="ii-name">${m.name}</span><span class="ii-date">${fmtDate(m.created_at)}</span></div>
        <div class="ii-contact">${m.contact}</div>
        ${m.properties ? `<div class="ii-ref">Bien : ${m.properties.ref} — ${m.properties.type}, ${m.properties.commune}</div>` : ''}
        <div class="ii-body">${m.message}</div>
        <div class="ii-actions">
          <button data-action="toggle-read">${m.is_read?'Marquer non lu':'Marquer lu'}</button>
          <button data-action="delete">Supprimer</button>
        </div>
      </div>`).join('');
    el.querySelectorAll('[data-action="toggle-read"]').forEach(btn=>{
      btn.onclick = async (e) => {
        const id = e.target.closest('.inbox-item').dataset.id;
        const m = INBOX.messages.find(x=>String(x.id)===id);
        await db.from('contact_messages').update({ is_read: !m.is_read }).eq('id', id);
        m.is_read = !m.is_read;
        renderInboxList(); loadInboxCounts();
      };
    });
    el.querySelectorAll('[data-action="delete"]').forEach(btn=>{
      btn.onclick = async (e) => {
        const id = e.target.closest('.inbox-item').dataset.id;
        if(!confirm('Supprimer ce message ?')) return;
        await db.from('contact_messages').delete().eq('id', id);
        INBOX.messages = INBOX.messages.filter(x=>String(x.id)!==id);
        renderInboxList(); loadInboxCounts();
      };
    });
  } else if(inboxTab === 'rdv'){
    if(!INBOX.appointments.length){ el.innerHTML = '<div class="inbox-empty">Aucune demande de rendez-vous.</div>'; return; }
    el.innerHTML = INBOX.appointments.map(a => `
      <div class="inbox-item" data-id="${a.id}">
        <div class="ii-top"><span class="ii-name">${a.name}</span><span class="ii-date">${fmtDate(a.created_at)}</span></div>
        <div class="ii-contact">${a.contact}</div>
        ${a.properties ? `<div class="ii-ref">Bien : ${a.properties.ref} — ${a.properties.type}, ${a.properties.commune}</div>` : ''}
        <div class="ii-body">Le ${new Date(a.preferred_date).toLocaleDateString('fr-FR')} · ${a.preferred_time||''}${a.message ? ' — '+a.message : ''}</div>
        <div class="ii-actions">
          <select data-action="status">
            <option value="En attente" ${a.status==='En attente'?'selected':''}>En attente</option>
            <option value="Confirmé" ${a.status==='Confirmé'?'selected':''}>Confirmé</option>
            <option value="Annulé" ${a.status==='Annulé'?'selected':''}>Annulé</option>
          </select>
          <button data-action="delete">Supprimer</button>
        </div>
      </div>`).join('');
    el.querySelectorAll('[data-action="status"]').forEach(sel=>{
      sel.onchange = async (e) => {
        const id = e.target.closest('.inbox-item').dataset.id;
        await db.from('appointments').update({ status: e.target.value }).eq('id', id);
        const a = INBOX.appointments.find(x=>String(x.id)===id);
        a.status = e.target.value;
        loadInboxCounts();
      };
    });
    el.querySelectorAll('[data-action="delete"]').forEach(btn=>{
      btn.onclick = async (e) => {
        const id = e.target.closest('.inbox-item').dataset.id;
        if(!confirm('Supprimer cette demande de RDV ?')) return;
        await db.from('appointments').delete().eq('id', id);
        INBOX.appointments = INBOX.appointments.filter(x=>String(x.id)!==id);
        renderInboxList(); loadInboxCounts();
      };
    });
  } else {
    if(!INBOX.alerts.length){ el.innerHTML = '<div class="inbox-empty">Aucune inscription aux alertes.</div>'; return; }
    el.innerHTML = INBOX.alerts.map(a => `
      <div class="inbox-item" data-id="${a.id}">
        <div class="ii-top"><span class="ii-name">${a.email}</span><span class="ii-date">${fmtDate(a.created_at)}</span></div>
        <div class="ii-body">${[a.type, a.operation, a.region].filter(Boolean).join(' · ') || 'Tous types'}${a.budget_max ? ' · max ' + Number(a.budget_max).toLocaleString('fr-FR') + ' FCFA' : ''}</div>
        <div class="ii-actions"><button data-action="delete">Supprimer</button></div>
      </div>`).join('');
    el.querySelectorAll('[data-action="delete"]').forEach(btn=>{
      btn.onclick = async (e) => {
        const id = e.target.closest('.inbox-item').dataset.id;
        if(!confirm('Supprimer cette inscription ?')) return;
        await db.from('alert_subscriptions').delete().eq('id', id);
        INBOX.alerts = INBOX.alerts.filter(x=>String(x.id)!==id);
        renderInboxList(); loadInboxCounts();
      };
    });
  }
}

async function openInbox(){
  await loadInboxData();
  renderInbox();
  document.getElementById('inboxDrawer').classList.add('open');
  document.getElementById('inboxOverlay').classList.add('open');
}
function closeInbox(){
  document.getElementById('inboxDrawer').classList.remove('open');
  document.getElementById('inboxOverlay').classList.remove('open');
}
document.getElementById('inboxOverlay').onclick = closeInbox;
document.getElementById('inboxBtn').onclick = openInbox;

// ---- Rendu global ----
function render(){
  renderChips();
  renderList();
  rebuildMarkers(filtered());
}
async function checkAuth(){
  const { data: { session } } = await db.auth.getSession();
  if(session){
    document.getElementById('authOverlay').style.display = 'none';
    IS_ADMIN = session.user.id === ADMIN_ID;
    document.getElementById('inboxBtn').style.display = IS_ADMIN ? '' : 'none';
    if(IS_ADMIN) await loadCollaborators();
    loadProperties();
    if(IS_ADMIN) loadInboxCounts();
  } else {
    document.getElementById('authOverlay').style.display = 'flex';
  }
}

document.getElementById('authSubmit').onclick = async () => {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  errEl.textContent = '';
  if(!email || !password){ errEl.textContent = 'Renseignez email et mot de passe.'; return; }
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if(error){ errEl.textContent = "Connexion refusée : identifiants incorrects."; return; }
  document.getElementById('authOverlay').style.display = 'none';
  IS_ADMIN = data.user.id === ADMIN_ID;
  document.getElementById('inboxBtn').style.display = IS_ADMIN ? '' : 'none';
  if(IS_ADMIN) await loadCollaborators();
  loadProperties();
  if(IS_ADMIN) loadInboxCounts();
};

document.getElementById('logoutBtn').onclick = async () => {
  await db.auth.signOut();
  location.reload();
};

checkAuth();

document.getElementById('search').addEventListener('input', e=>{ state.search = e.target.value; render(); });
document.getElementById('statusFilter').addEventListener('change', e=>{ state.status = e.target.value; render(); });
document.querySelectorAll('#viewToggle button').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('#viewToggle button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('split').dataset.view = b.dataset.view;
    if(b.dataset.view==='map') setTimeout(()=>map.invalidateSize(), 100);
  };
});
</script>
