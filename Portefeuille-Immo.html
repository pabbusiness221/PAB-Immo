  const filterSelect = document.getElementById('inboxFilterSelect');
  if(filterSelect){
    filterSelect.onchange = (e) => {
      if(inboxTab === 'messages') inboxMsgFilter = e.target.value;
      if(inboxTab === 'rdv') inboxRdvFilter = e.target.value;
      renderInboxList();
    };
  }
  renderInboxList();
}

const RDV_STATUS_COLOR = { 'En attente':'#B8842A', 'Confirmé':'#16A34A', 'Annulé':'#8B9199' };

// Rendu réutilisable d'une liste de RDV (vue Liste ET détail du jour sélectionné en vue Calendrier)
function renderRdvItems(container, items){
  if(!items.length){ container.innerHTML = '<div class="inbox-empty">Aucune demande de rendez-vous.</div>'; return; }
  container.innerHTML = items.map(a => `
    <div class="inbox-item" data-id="${a.id}">
      <div class="ii-top"><span class="ii-name">${esc(a.name)}</span><span class="ii-date">${fmtDate(a.created_at)}</span></div>
      <div class="ii-contact">${esc(a.contact)}</div>
      ${a.properties ? `<div class="ii-ref">Bien : ${esc(a.properties.ref)} — ${a.properties.type}, ${esc(a.properties.commune)}</div>` : ''}
      <div class="ii-body">Le ${fmtDateOnly(a.preferred_date)} · ${esc(a.preferred_time||'')}${a.message ? ' — '+esc(a.message) : ''}</div>
      <div class="ii-actions">
        <select data-action="status">
          <option value="En attente" ${a.status==='En attente'?'selected':''}>En attente</option>
          <option value="Confirmé" ${a.status==='Confirmé'?'selected':''}>Confirmé</option>
          <option value="Annulé" ${a.status==='Annulé'?'selected':''}>Annulé</option>
        </select>
        <button data-action="delete">Supprimer</button>
      </div>
    </div>`).join('');
  container.querySelectorAll('[data-action="status"]').forEach(sel=>{
    sel.onchange = async (e) => {
      const id = e.target.closest('.inbox-item').dataset.id;
      await db.from('appointments').update({ status: e.target.value }).eq('id', id);
      const a = INBOX.appointments.find(x=>String(x.id)===id);
      if(a) a.status = e.target.value;
      loadInboxCounts();
      renderInboxList();   // rafraîchit filtre + couleurs en vue Liste ET Calendrier
    };
  });
  container.querySelectorAll('[data-action="delete"]').forEach(btn=>{
    btn.onclick = async (e) => {
      const id = e.target.closest('.inbox-item').dataset.id;
      if(!confirm('Supprimer cette demande de RDV ?')) return;
      await db.from('appointments').delete().eq('id', id);
      INBOX.appointments = INBOX.appointments.filter(x=>String(x.id)!==id);
      loadInboxCounts();
      renderInboxList();
    };
  });
}

function renderRdvCalendar(container){
  const year = calendarMonth.getFullYear();
  const month = calendarMonth.getMonth();
  const startOffset = (new Date(year, month, 1).getDay() + 6) % 7; // lundi en premier
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = localDateStr(new Date());

  const byDay = {};
  rdvFilteredItems.forEach(a => { (byDay[a.preferred_date] ||= []).push(a); });

  const monthLabel = calendarMonth.toLocaleDateString('fr-FR', { month:'long', year:'numeric' });

  let cellsHtml = '';
  for(let i=0;i<startOffset;i++){ cellsHtml += `<div class="cal-day muted"></div>`; }
  for(let day=1; day<=daysInMonth; day++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const apts = byDay[dateStr] || [];
    cellsHtml += `
      <div class="cal-day ${dateStr===todayStr?'today':''} ${dateStr===selectedCalendarDay?'selected':''}" data-date="${dateStr}">
        <span class="cal-day-num">${day}</span>
        ${apts.length ? `<div class="cal-day-apts">
          ${apts.slice(0,2).map(a=>`<span class="cal-apt-chip" style="background:${RDV_STATUS_COLOR[a.status]}22;color:${RDV_STATUS_COLOR[a.status]}">${esc((a.name||'').split(' ')[0])}</span>`).join('')}
          ${apts.length>2?`<span class="cal-apt-more">+${apts.length-2}</span>`:''}
        </div>` : ''}
      </div>`;
  }

  container.innerHTML = `
    <div class="cal-toolbar">
      <button type="button" class="cal-nav" data-nav="-1">‹</button>
      <span class="cal-month-label">${monthLabel}</span>
      <button type="button" class="cal-nav" data-nav="1">›</button>
      <button type="button" class="cal-today-btn" id="calTodayBtn">Aujourd'hui</button>
    </div>
    <div class="cal-grid">
      <div class="cal-dow">L</div><div class="cal-dow">M</div><div class="cal-dow">M</div><div class="cal-dow">J</div><div class="cal-dow">V</div><div class="cal-dow">S</div><div class="cal-dow">D</div>
      ${cellsHtml}
    </div>
    <div class="section-title" style="margin-top:16px;">${selectedCalendarDay ? new Date(selectedCalendarDay+'T00:00:00').toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'}) : 'Cliquez un jour pour voir le détail'}</div>
    <div id="calDayDetail"></div>`;

  container.querySelectorAll('[data-nav]').forEach(btn=>{
    btn.onclick = () => { calendarMonth = new Date(year, month + Number(btn.dataset.nav), 1); renderRdvCalendar(container); };
  });
  document.getElementById('calTodayBtn').onclick = () => {
    const d = new Date(); d.setDate(1); d.setHours(0,0,0,0);
    calendarMonth = d;
    selectedCalendarDay = localDateStr(new Date());
    renderRdvCalendar(container);
  };
  container.querySelectorAll('.cal-day[data-date]').forEach(cell=>{
    cell.onclick = () => {
      selectedCalendarDay = cell.dataset.date === selectedCalendarDay ? null : cell.dataset.date;
      renderRdvCalendar(container);
    };
  });

  const detailEl = document.getElementById('calDayDetail');
  if(selectedCalendarDay){ renderRdvItems(detailEl, byDay[selectedCalendarDay] || []); }
  else { detailEl.innerHTML = ''; }
}

function renderInboxList(){
  const el = document.getElementById('inboxList');
  if(inboxTab === 'messages'){
    let items = INBOX.messages;
    if(inboxMsgFilter === 'unread') items = items.filter(m => !m.is_read);
    else if(inboxMsgFilter === 'read') items = items.filter(m => m.is_read);
    items = items.filter(m => matchesInboxSearch([m.name, m.contact, m.message, m.properties?.ref, m.properties?.commune]));
    if(!items.length){
      el.innerHTML = `<div class="inbox-empty">${INBOX.messages.length ? 'Aucun message ne correspond à votre recherche.' : 'Aucun message pour l’instant.'}</div>`;
      return;
    }
    el.innerHTML = items.map(m => `
      <div class="inbox-item ${!m.is_read?'unread':''}" data-id="${m.id}">
        <div class="ii-top"><span class="ii-name">${esc(m.name)}</span><span class="ii-date">${fmtDate(m.created_at)}</span></div>
        <div class="ii-contact">${esc(m.contact)}</div>
        ${m.properties ? `<div class="ii-ref">Bien : ${esc(m.properties.ref)} — ${m.properties.type}, ${esc(m.properties.commune)}</div>` : ''}
        <div class="ii-body">${esc(m.message)}</div>
        <div class="ii-actions">
          <button data-action="toggle-read">${m.is_read?'Marquer non lu':'Marquer lu'}</button>
          <button data-action="delete">Supprimer</button>
        </div>
      </div>`).join('');
    el.querySelectorAll('[data-action="toggle-read"]').forEach(btn=>{
      btn.onclick = async (e) => {
        const id = e.target.closest('.inbox-item').dataset.id;
        const m = INBOX.messages.find(x=>String(x.id)===id);
        await db.from('contact_messages').update({ is_read: !m.is_read }).eq('id', id);
        m.is_read = !m.is_read;
        renderInboxList(); loadInboxCounts();
      };
    });
    el.querySelectorAll('[data-action="delete"]').forEach(btn=>{
      btn.onclick = async (e) => {
        const id = e.target.closest('.inbox-item').dataset.id;
        if(!confirm('Supprimer ce message ?')) return;
        await db.from('contact_messages').delete().eq('id', id);
        INBOX.messages = INBOX.messages.filter(x=>String(x.id)!==id);
        renderInboxList(); loadInboxCounts();
      };
    });
  } else if(inboxTab === 'rdv'){
    rdvFilteredItems = INBOX.appointments
      .filter(a => inboxRdvFilter === 'all' || a.status === inboxRdvFilter)
      .filter(a => matchesInboxSearch([a.name, a.contact, a.message, a.properties?.ref, a.properties?.commune]));
    el.innerHTML = `
      <div class="rdv-view-toggle" style="margin-bottom:12px;">
        <button data-rdvview="list" class="${rdvView==='list'?'active':''}">Liste</button>
        <button data-rdvview="calendar" class="${rdvView==='calendar'?'active':''}">Calendrier</button>
      </div>
      <div id="rdvContent"></div>`;
    el.querySelectorAll('[data-rdvview]').forEach(btn=>{
      btn.onclick = () => { rdvView = btn.dataset.rdvview; renderInboxList(); };
    });
    const content = document.getElementById('rdvContent');
    if(rdvView === 'calendar'){ renderRdvCalendar(content); }
    else { renderRdvItems(content, rdvFilteredItems); }
  } else {
    const items = INBOX.alerts.filter(a => matchesInboxSearch([a.email, a.type, a.operation, a.region]));
    if(!items.length){
      el.innerHTML = `<div class="inbox-empty">${INBOX.alerts.length ? 'Aucune alerte ne correspond à votre recherche.' : 'Aucune inscription aux alertes.'}</div>`;
      return;
    }
    el.innerHTML = items.map(a => `
      <div class="inbox-item" data-id="${a.id}">
        <div class="ii-top"><span class="ii-name">${esc(a.email)}</span><span class="ii-date">${fmtDate(a.created_at)}</span></div>
        <div class="ii-body">${esc([a.type, a.operation, a.region].filter(Boolean).join(' · ') || 'Tous types')}${a.budget_max ? ' · max ' + Number(a.budget_max).toLocaleString('fr-FR') + ' FCFA' : ''}</div>
        <div class="ii-actions"><button data-action="delete">Supprimer</button></div>
      </div>`).join('');
    el.querySelectorAll('[data-action="delete"]').forEach(btn=>{
      btn.onclick = async (e) => {
        const id = e.target.closest('.inbox-item').dataset.id;
        if(!confirm('Supprimer cette inscription ?')) return;
        await db.from('alert_subscriptions').delete().eq('id', id);
        INBOX.alerts = INBOX.alerts.filter(x=>String(x.id)!==id);
        renderInboxList(); loadInboxCounts();
      };
    });
  }
}

// JOURNAL D'ACTIVITÉ
// ============================================================
// La table activity_logs est alimentée par un déclencheur en base
// (log_property_activity), pas par cette page : le journal enregistre donc
// aussi ce qui est fait hors interface, par exemple depuis la console
// Supabase. Sa lecture est réservée à l'admin par les règles de sécurité.

const JOURNAL_PAR_PAGE = 25;
let JOURNAL_ROWS = [];
let journalFiltre = 'Tous';
let journalPage = 1;

// Libellé, couleur et icône de chaque type d'événement enregistré par le
// déclencheur. Un type inconnu (ajouté plus tard en base) reste affiché
// tel quel plutôt que d'être ignoré silencieusement.
const JOURNAL_ACTIONS = {
  create_property:          { label:'Bien créé',            couleur:'#2F7A4E', icone:'+' },
  update_property:          { label:'Bien modifié',         couleur:'#6B7772', icone:'✎' },
  update_status:            { label:'Statut changé',        couleur:'#C8871A', icone:'⇄' },
  archive_property:         { label:'Bien archivé',         couleur:'#8B9199', icone:'▤' },
  restore_property:         { label:'Bien restauré',        couleur:'#1F7A73', icone:'↺' },
  delete_property_permanent:{ label:'Suppression définitive',couleur:'#C4432F', icone:'✕' }
};

function journalActionInfo(action){
  return JOURNAL_ACTIONS[action] || { label: action, couleur:'#6B7772', icone:'•' };
}

function journalActeur(actorId){
  if(!actorId) return 'Système';           // modification hors session (SQL, migration)
  if(actorId === ADMIN_ID) return 'Vous';
  return COLLABORATORS[actorId] || 'Collaborateur (non nommé)';
}

// Date lisible : l'heure exacte compte dans un journal d'audit.
function journalDate(iso){
  const d = new Date(iso);
  const auj = new Date();
  const memeJour = d.toDateString() === auj.toDateString();
  const heure = d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
  if(memeJour) return `Aujourd'hui à ${heure}`;
  return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric' }) + ` à ${heure}`;
}

async function loadJournalData(){
  const { data, error } = await db.from('activity_logs')
    .select('id, actor_id, action, entity_type, entity_id, details, created_at')
    .order('created_at', { ascending:false })
    .limit(500);
  if(error){ JOURNAL_ROWS = null; return; }
  JOURNAL_ROWS = data || [];
}

function renderJournal(){
  const d = document.getElementById('journalDrawer');

  if(JOURNAL_ROWS === null){
    d.innerHTML = `
      <div class="inbox-tabs"><strong style="font-family:'Manrope',sans-serif;font-size:17px;">Journal d'activité</strong></div>
      <div class="inbox-empty">Lecture du journal impossible. Cette page est réservée à l'administrateur.</div>`;
    return;
  }

  const lignes = journalFiltre === 'Tous'
    ? JOURNAL_ROWS
    : JOURNAL_ROWS.filter(r => r.action === journalFiltre);

  const totalPages = Math.max(1, Math.ceil(lignes.length / JOURNAL_PAR_PAGE));
  journalPage = Math.min(Math.max(1, journalPage), totalPages);
  const debut = (journalPage - 1) * JOURNAL_PAR_PAGE;
  const page = lignes.slice(debut, debut + JOURNAL_PAR_PAGE);

  // On ne propose que les filtres réellement présents dans le journal.
  const presentes = [...new Set(JOURNAL_ROWS.map(r => r.action))];

  d.innerHTML = `
    <div class="journal-tete">
      <div>
        <strong>Journal d'activité</strong>
        <p>${JOURNAL_ROWS.length} événement${JOURNAL_ROWS.length>1?'s':''} enregistré${JOURNAL_ROWS.length>1?'s':''}</p>
      </div>
      <button type="button" class="drawer-close" id="journalClose" aria-label="Fermer">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </button>
    </div>

    <div class="journal-filtres">
      <button type="button" class="chip ${journalFiltre==='Tous'?'active':''}" data-journal-filtre="Tous">Tout <span class="count">${JOURNAL_ROWS.length}</span></button>
      ${presentes.map(a=>{
        const info = journalActionInfo(a);
        const n = JOURNAL_ROWS.filter(r=>r.action===a).length;
        return `<button type="button" class="chip ${journalFiltre===a?'active':''}" data-journal-filtre="${esc(a)}">${esc(info.label)} <span class="count">${n}</span></button>`;
      }).join('')}
    </div>

    ${lignes.length === 0 ? `<div class="inbox-empty">Aucun événement pour ce filtre.</div>` : `
      <div class="journal-liste">
        ${page.map(r=>{
          const info = journalActionInfo(r.action);
          const det = r.details || {};
          const ref = det.ref ? esc(det.ref) : null;
          // Le bien peut avoir été supprimé depuis : la référence conservée
          // dans details reste lisible même quand la fiche n'existe plus.
          const existe = ref && PROPERTIES.some(p => String(p.id) === String(r.entity_id));
          const changement = (det.old_status || det.new_status)
            ? `<span class="journal-transition">${esc(det.old_status || '—')} <span aria-hidden="true">→</span> ${esc(det.new_status || '—')}</span>` : '';
          return `
            <div class="journal-item">
              <span class="journal-puce" style="background:${info.couleur}1F;color:${info.couleur};" aria-hidden="true">${info.icone}</span>
              <div class="journal-corps">
                <div class="journal-ligne1">
                  <strong>${esc(info.label)}</strong>
                  ${ref ? (existe
                      ? `<button type="button" class="journal-ref" data-journal-bien="${esc(String(r.entity_id))}">${ref}</button>`
                      : `<span class="journal-ref journal-ref-morte" title="Ce bien n'existe plus">${ref}</span>`) : ''}
                </div>
                ${changement}
                <div class="journal-meta">${esc(journalActeur(r.actor_id))} · ${esc(journalDate(r.created_at))}</div>
              </div>
            </div>`;
        }).join('')}
        ${totalPages > 1 ? `
          <nav class="list-pager" aria-label="Pagination du journal">
            <button type="button" class="pager-btn" data-journal-page="-1" ${journalPage===1?'disabled':''}>‹ Précédent</button>
            <span class="pager-status">Page ${journalPage} sur ${totalPages}<small>${debut+1}–${debut+page.length} sur ${lignes.length}</small></span>
            <button type="button" class="pager-btn" data-journal-page="1" ${journalPage===totalPages?'disabled':''}>Suivant ›</button>
          </nav>` : ''}
      </div>`}
  `;

  document.getElementById('journalClose').onclick = closeJournal;
  d.querySelectorAll('[data-journal-filtre]').forEach(b=>{
    b.onclick = () => { journalFiltre = b.dataset.journalFiltre; journalPage = 1; renderJournal(); };
  });
  d.querySelectorAll('[data-journal-page]').forEach(b=>{
    b.onclick = () => { journalPage += Number(b.dataset.journalPage); renderJournal(); d.scrollTop = 0; };
  });
  d.querySelectorAll('[data-journal-bien]').forEach(b=>{
    b.onclick = () => {
      const p = PROPERTIES.find(x => String(x.id) === String(b.dataset.journalBien));
      if(p){ closeJournal(); openDrawer(p); }
    };
  });
}

  document.getElementById('journalOverlay').classList.remove('open');

let analyticsCharts = [];

function lastNMonths(n){
  const out = [];
  const base = new Date(); base.setDate(1);
  for(let i=n-1;i>=0;i--){
    const dt = new Date(base.getFullYear(), base.getMonth()-i, 1);
    out.push({
      key: dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0'),
      label: dt.toLocaleDateString('fr-FR', {month:'short', year:'2-digit'})
    });
  }
  return out;
}
function countByMonth(rows, dateField){
  const map = {};
  (rows||[]).forEach(r=>{
    const v = r[dateField];
    if(!v) return;
    const k = v.slice(0,7);
    map[k] = (map[k]||0)+1;
  });
  return map;
}

async function loadAnalyticsData(){
  const [
    { data: visitRows },
    { data: viewRows },
    { data: favRows },
    { data: msgRows },
    { data: rdvRows },
    { data: statusHistory }
  ] = await Promise.all([
    db.from('site_visits').select('session_id'),
    db.from('property_views').select('property_id'),
    db.from('favorite_events').select('property_id').eq('action','add'),
    db.from('contact_messages').select('id, created_at'),
    db.from('appointments').select('id, created_at, status'),
    db.from('property_status_history').select('property_id, new_status, changed_at')
  ]);
  // Chaque requête ci-dessus est filtrée par les règles de sécurité de la
  // base : l'admin voit tout, un collaborateur ne voit que ce qui touche à
  // ses propres biens. Aucun filtrage n'est fait ici, ce serait redondant et
  // surtout contournable.

  const viewsByProperty = {};
  (viewRows||[]).forEach(r=>{ viewsByProperty[r.property_id] = (viewsByProperty[r.property_id]||0)+1; });
  const favByProperty = {};
  (favRows||[]).forEach(r=>{ favByProperty[r.property_id] = (favByProperty[r.property_id]||0)+1; });

  const uniqueVisitors = new Set((visitRows||[]).map(r=>r.session_id)).size;
  const totalViews = (viewRows||[]).length;
  const totalFavAdds = (favRows||[]).length;
  const totalMsg = (msgRows||[]).length;
  const totalRdv = (rdvRows||[]).length;
  // Plafonné à 100 % : les messages/RDV historiques (antérieurs au suivi des
  // visiteurs) peuvent gonfler le ratio au-delà de 100 %, ce qui n'aurait pas de sens.
  const conversionRate = uniqueVisitors > 0 ? Math.min(100, Math.round(((totalMsg+totalRdv)/uniqueVisitors)*1000)/10) : 0;

  // Contacts générés : toute prise de contact, message ou demande de visite.
  const totalContacts = totalMsg + totalRdv;
  // Visites organisées : une demande de RDV confirmée. Faute d'un statut
  // « Réalisée » dans la base, on ne peut pas savoir si la visite a bien eu
  // lieu — c'est une visite planifiée, pas une visite effectuée.
  const visitesOrganisees = (rdvRows||[]).filter(r => r.status === 'Confirmé').length;
  const rdvAnnules = (rdvRows||[]).filter(r => r.status === 'Annulé').length;
  // Conversion des prospects : part des contacts qui aboutissent à une visite
  // confirmée. Indicateur provisoire — un vrai suivi d'affaire (contacté,
  // négociation, gagné/perdu) donnera mieux.
  const prospectRate = totalContacts > 0 ? Math.round((visitesOrganisees / totalContacts) * 1000) / 10 : 0;

  const salesByMonth = {}, rentalsByMonth = {};
  (statusHistory||[]).forEach(h=>{
    if(!h.changed_at) return;
    const k = h.changed_at.slice(0,7);
    if(h.new_status === 'Vendu') salesByMonth[k] = (salesByMonth[k]||0)+1;
    if(h.new_status === 'Loué') rentalsByMonth[k] = (rentalsByMonth[k]||0)+1;
  });
  const msgByMonth = countByMonth(msgRows, 'created_at');
  const rdvByMonth = countByMonth(rdvRows, 'created_at');

  const byRegion = {}, byCollaborator = {};
  PROPERTIES.filter(p=>!p.archived_at).forEach(p=>{
    byRegion[p.region] = (byRegion[p.region]||0)+1;
    const label = ownerLabel(p.owner_id);
    byCollaborator[label] = (byCollaborator[label]||0)+1;
  });

  // Nombre d'agences actives : réservé à l'admin, et faute de notion d'agence
  // dans la base, on compte les collaborateurs ayant au moins un bien non
  // archivé. À revoir le jour où une vraie table d'agences existera.
  const agencesActives = IS_ADMIN
    ? new Set(PROPERTIES.filter(p=>!p.archived_at).map(p=>p.owner_id)).size
    : null;

  return {
    uniqueVisitors, totalViews, totalFavAdds, totalMsg, totalRdv, conversionRate,
    totalContacts, visitesOrganisees, rdvAnnules, prospectRate, agencesActives,
    salesByMonth, rentalsByMonth, msgByMonth, rdvByMonth,
    byRegion, byCollaborator, viewsByProperty, favByProperty
  };
}

function topPropertiesList(counts, emptyLabel){
  const entries = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if(!entries.length) return `<div class="analytics-empty">${emptyLabel}</div>`;
  return `<div class="top-list">${entries.map(([id,count],i)=>{
    const p = PROPERTIES.find(x=>String(x.id)===String(id));
    const label = p ? `${esc(p.ref)} — ${esc(p.type)}, ${esc(p.commune)}` : 'Bien supprimé';
    return `<div class="top-list-item"><span class="top-list-rank">${i+1}</span><span class="top-list-label">${label}</span><span class="top-list-count">${count}</span></div>`;
  }).join('')}</div>`;
}

// Palette des graphiques alignée sur le thème (vert profond / or) — valeurs
// de présentation uniquement, la logique des graphiques est inchangée.
const CHART_COLORS = { primary:'#123027', success:'#2F7A4E', warning:'#E2A22C', danger:'#C4432F', ink:'#131A17', soft:'#6B7772', border:'#E6E3DB' };

// Chargement résilient de Chart.js : si le CDN principal a échoué (script blanc,
// blocage réseau, URL obsolète), on tente d'autres sources avant d'abandonner.
// C'est ce qui empêchait les graphiques de s'afficher (Chart était introuvable).
function loadScriptOnce(src){
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.async = true;
    s.onload = () => resolve(src);
    s.onerror = () => reject(new Error('Échec de chargement : ' + src));
    document.head.appendChild(s);
  });
}
async function ensureChartJs(){
  if(typeof Chart !== 'undefined') return true;
  const sources = [
    'https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js',
    'https://unpkg.com/chart.js@4.4.4/dist/chart.umd.js',
    'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js'
  ];
  for(const src of sources){
    try{ await loadScriptOnce(src); if(typeof Chart !== 'undefined') return true; }
    catch(e){ /* source suivante */ }
  }
  return typeof Chart !== 'undefined';
}

function renderAnalytics(d){
  const body = document.getElementById('analyticsBody');
  const months = lastNMonths(6);
  const monthLabels = months.map(m=>m.label);

  // « Visiteurs » et « Taux de conversion » viennent de site_visits, qui reste
  // réservée à l'admin : un collaborateur n'a aucun moyen de savoir combien de
  // personnes ont visité le site. On masque ces deux cases plutôt que
  // d'afficher un zéro trompeur.
  body.innerHTML = `
    <div class="kpi-grid">
      ${IS_ADMIN ? `<div class="kpi-card"><div class="kv">${d.agencesActives}</div><div class="kl">Agences actives</div></div>` : ''}
      ${IS_ADMIN ? `<div class="kpi-card"><div class="kv">${d.uniqueVisitors}</div><div class="kl">Visiteurs</div></div>` : ''}
      <div class="kpi-card"><div class="kv">${d.totalViews}</div><div class="kl">Biens consultés</div></div>
      <div class="kpi-card"><div class="kv">${d.totalFavAdds}</div><div class="kl">Mises en favoris</div></div>
      <div class="kpi-card"><div class="kv">${d.totalContacts}</div><div class="kl">Contacts générés</div></div>
      <div class="kpi-card"><div class="kv">${d.visitesOrganisees}</div><div class="kl">Visites organisées</div></div>
      <div class="kpi-card"><div class="kv">${d.prospectRate}%</div><div class="kl">Conversion prospects</div></div>
      <div class="kpi-card"><div class="kv">${d.totalMsg}</div><div class="kl">Messages reçus</div></div>
      <div class="kpi-card"><div class="kv">${d.totalRdv}</div><div class="kl">Demandes de RDV</div></div>
      ${IS_ADMIN ? `<div class="kpi-card"><div class="kv">${d.conversionRate}%</div><div class="kl">Visiteurs → contact</div></div>` : ''}
    </div>
    <p class="analytics-note">
      <strong>Contacts générés</strong> : messages + demandes de visite.
      <strong>Visites organisées</strong> : demandes de RDV confirmées${d.rdvAnnules ? ` (${d.rdvAnnules} annulée${d.rdvAnnules>1?'s':''} sur la période)` : ''}.
      <strong>Conversion prospects</strong> : part des contacts aboutissant à une visite confirmée.
      ${IS_ADMIN ? '' : 'Ces chiffres ne portent que sur vos biens.'}
    </p>
    <div class="charts-grid">
      <div class="chart-card full"><h3>Évolution du portefeuille (biens cumulés, 6 derniers mois)</h3><canvas id="chartPortfolio"></canvas></div>
      <div class="chart-card"><h3>Ventes &amp; locations par mois</h3><canvas id="chartSalesRentals"></canvas></div>
      <div class="chart-card"><h3>Messages &amp; RDV par mois</h3><canvas id="chartLeads"></canvas></div>
      <div class="chart-card"><h3>Biens par région</h3><canvas id="chartRegion"></canvas></div>
      ${IS_ADMIN ? `<div class="chart-card"><h3>Biens par collaborateur</h3><canvas id="chartCollab"></canvas></div>` : ''}
      <div class="chart-card"><h3>Biens les plus consultés</h3>${topPropertiesList(d.viewsByProperty, 'Aucune consultation enregistrée pour l’instant.')}</div>
      <div class="chart-card"><h3>Biens les plus ajoutés en favoris</h3>${topPropertiesList(d.favByProperty, 'Aucun favori enregistré pour l’instant.')}</div>
    </div>
  `;

  analyticsCharts.forEach(c=>{ try{ c.destroy(); }catch(e){} });
  analyticsCharts = [];

  // Si Chart.js n'a pas pu être chargé du tout, on l'indique clairement dans
  // chaque cadre au lieu d'afficher des graphiques vides sans explication.
  if(typeof Chart === 'undefined'){
    document.querySelectorAll('.charts-grid .chart-card canvas').forEach(cv=>{
      const msg = document.createElement('p');
      msg.style.cssText = 'color:var(--ink-soft);font-size:12.5px;text-align:center;padding:24px 0;margin:0;';
      msg.textContent = 'Graphique indisponible : la librairie Chart.js n’a pas pu être chargée (vérifiez la connexion internet).';
      cv.replaceWith(msg);
    });
    return;
  }

  const mk = (id, config) => {
    const el = document.getElementById(id);
    if(!el) return;
    try{
      analyticsCharts.push(new Chart(el, config));
    }catch(e){
      console.error('Erreur création du graphique ' + id + ' :', e);
      const msg = document.createElement('p');
      msg.style.cssText = 'color:var(--ink-soft);font-size:12.5px;text-align:center;padding:24px 0;margin:0;';
      msg.textContent = 'Graphique indisponible.';
      el.replaceWith(msg);
    }
  };

  // Portefeuille cumulé
  let cumulative = 0;
  const portfolioData = months.map(m=>{
    const endOfMonth = new Date(m.key+'-01'); endOfMonth.setMonth(endOfMonth.getMonth()+1);
    return PROPERTIES.filter(p => !p.archived_at && p.created_at && new Date(p.created_at) < endOfMonth).length;
  });
  mk('chartPortfolio', { type:'line', data:{ labels:monthLabels, datasets:[{ label:'Biens au total', data:portfolioData, borderColor:CHART_COLORS.primary, backgroundColor:CHART_COLORS.primary+'22', fill:true, tension:.3 }] }, options:{ plugins:{legend:{display:false}}, scales:{y:{beginAtZero:true, ticks:{precision:0}}} } });

  mk('chartSalesRentals', { type:'bar', data:{ labels:monthLabels, datasets:[
    { label:'Ventes', data: months.map(m=>d.salesByMonth[m.key]||0), backgroundColor:CHART_COLORS.success },
    { label:'Locations', data: months.map(m=>d.rentalsByMonth[m.key]||0), backgroundColor:CHART_COLORS.primary }
  ]}, options:{ scales:{y:{beginAtZero:true, ticks:{precision:0}}} } });

  mk('chartLeads', { type:'bar', data:{ labels:monthLabels, datasets:[
    { label:'Messages', data: months.map(m=>d.msgByMonth[m.key]||0), backgroundColor:CHART_COLORS.warning },
    { label:'RDV', data: months.map(m=>d.rdvByMonth[m.key]||0), backgroundColor:CHART_COLORS.danger }
  ]}, options:{ scales:{y:{beginAtZero:true, ticks:{precision:0}}} } });

  const regionEntries = Object.entries(d.byRegion).sort((a,b)=>b[1]-a[1]);
  mk('chartRegion', { type:'bar', data:{ labels:regionEntries.map(e=>e[0]), datasets:[{ label:'Biens', data:regionEntries.map(e=>e[1]), backgroundColor:CHART_COLORS.primary }] }, options:{ indexAxis:'y', plugins:{legend:{display:false}}, scales:{x:{beginAtZero:true, ticks:{precision:0}}} } });

  const collabEntries = Object.entries(d.byCollaborator).sort((a,b)=>b[1]-a[1]);
  mk('chartCollab', { type:'bar', data:{ labels:collabEntries.map(e=>e[0]), datasets:[{ label:'Biens ajoutés', data:collabEntries.map(e=>e[1]), backgroundColor:CHART_COLORS.success }] }, options:{ indexAxis:'y', plugins:{legend:{display:false}}, scales:{x:{beginAtZero:true, ticks:{precision:0}}} } });
}

async function openAnalytics(){
  const overlay = document.getElementById('analyticsOverlay');
  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <div class="analytics-header">
      <div><h2>Statistiques</h2><p>${IS_ADMIN ? "Vue d'ensemble de l'activité" : 'Vos biens uniquement'} — 6 derniers mois</p></div>
      <button class="analytics-close" id="analyticsCloseBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0F172A" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="analytics-body" id="analyticsBody"><p style="text-align:center;color:var(--ink-soft);padding:60px 0;">Chargement des statistiques…</p></div>
  `;
  document.getElementById('analyticsCloseBtn').onclick = closeAnalytics;
  const data = await loadAnalyticsData();
  await ensureChartJs();
  renderAnalytics(data);
}
function closeAnalytics(){
  document.getElementById('analyticsOverlay').classList.add('hidden');
  analyticsCharts.forEach(c=>c.destroy());
  analyticsCharts = [];
}
document.getElementById('analyticsBtn').onclick = openAnalytics;

// ---- Rendu global ----
function render(){
  // Tout changement de filtre, de statut ou d'archives passe par ici : on
  // repart de la première page, sinon on peut atterrir sur une page vide.
  state.page = 1;
  renderChips();
  renderList();
  rebuildMarkers(filtered());
}
async function checkAuth(){
  const { data: { session } } = await db.auth.getSession();
  if(session){
    document.getElementById('authOverlay').style.display = 'none';
    IS_ADMIN = session.user.id === ADMIN_ID;
    document.getElementById('inboxBtn').style.display = IS_ADMIN ? '' : 'none';
  // Le journal trace qui a fait quoi sur les biens de tout le monde :
  // il reste reserve a l'admin, comme la regle de lecture en base.
  document.getElementById('journalBtn').style.display = IS_ADMIN ? '' : 'none';
    // Les statistiques sont ouvertes aux collaborateurs : les règles de
  // sécurité de la base restreignent d'elles-mêmes les chiffres à leurs
  // propres biens. La boîte de réception reste réservée à l'admin.
  document.getElementById('analyticsBtn').style.display = '';
    if(IS_ADMIN) await loadCollaborators();
    loadProperties();
    if(IS_ADMIN) loadInboxCounts();
  } else {
    document.getElementById('authOverlay').style.display = 'flex';
  }
}

document.getElementById('authSubmit').onclick = async () => {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authError');
  errEl.textContent = '';
  if(!email || !password){ errEl.textContent = 'Renseignez email et mot de passe.'; return; }
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if(error){ errEl.textContent = "Connexion refusée : identifiants incorrects."; return; }
  document.getElementById('authOverlay').style.display = 'none';
  IS_ADMIN = data.user.id === ADMIN_ID;
  document.getElementById('inboxBtn').style.display = IS_ADMIN ? '' : 'none';
  // Le journal trace qui a fait quoi sur les biens de tout le monde :
  // il reste reserve a l'admin, comme la regle de lecture en base.
  document.getElementById('journalBtn').style.display = IS_ADMIN ? '' : 'none';
  // Les statistiques sont ouvertes aux collaborateurs : les règles de
  // sécurité de la base restreignent d'elles-mêmes les chiffres à leurs
  // propres biens. La boîte de réception reste réservée à l'admin.
  document.getElementById('analyticsBtn').style.display = '';
  if(IS_ADMIN) await loadCollaborators();
  loadProperties();
  if(IS_ADMIN) loadInboxCounts();
};

document.getElementById('logoutBtn').onclick = async () => {
  await db.auth.signOut();
  location.reload();
};

checkAuth();

// Recherche temporisée : chaque frappe reconstruisait la liste et
// détruisait puis recréait tous les marqueurs Leaflet. Taper « Dakar »
// déclenchait cinq reconstructions complètes. On attend une courte pause
// dans la frappe avant de rendre.
let searchTimer = null;
document.getElementById('search').addEventListener('input', e=>{
  state.search = e.target.value;
  clearTimeout(searchTimer);
  searchTimer = setTimeout(render, 180);
});
document.getElementById('statusFilter').addEventListener('change', e=>{ state.status = e.target.value; render(); });
document.getElementById('archiveToggleBtn').onclick = () => {
  state.showArchived = !state.showArchived;
  state.selected = null;
  const btn = document.getElementById('archiveToggleBtn');
  btn.classList.toggle('btn-primary', state.showArchived);
  btn.classList.toggle('btn-outline', !state.showArchived);
  document.getElementById('archiveToggleLabel').textContent = state.showArchived ? 'Voir les biens actifs' : 'Archives';
  render();
};
document.querySelectorAll('#viewToggle button').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('#viewToggle button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('split').dataset.view = b.dataset.view;
    if(b.dataset.view==='map' && map) setTimeout(()=>map.invalidateSize(), 100);
  };
});
</script>
