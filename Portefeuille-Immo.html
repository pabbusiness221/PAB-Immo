<title>PAB Immo - Mon Portefeuille - Immobilier</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     PAB IMMO — Espace privé (portefeuille)
     Même système de design que l'interface client : barre nuit,
     accent or, contenu sur fond clair. Densité plus forte ici :
     c'est un outil de gestion, pas une vitrine.
     Règle absolue : aucun id / classe utilisé par le JS n'est modifié.
     ============================================================ */
  :root{
    --bg:#F6F5F2;
    --surface:#FFFFFF;
    --surface-alt:#F2F0EA;
    --ink:#131A17;
    --ink-soft:#6B7772;
    --border:#E6E3DB;

    --primary:#123027;
    --primary-dark:#0B1F19;
    --accent:#E2A22C;
    --accent-dark:#C8871A;
    --accent-soft:#FBF2DF;

    --success:#2F7A4E;
    --warning:#D08A16;
    --danger:#C4432F;

    /* Couleurs métier (cohérentes avec TYPE_COLOR / STATUS_COLOR en JS) */
    --brick:#B24A2C;   /* Terrain */
    --navy:#2E4A61;    /* Maison */
    --teal:#1F7A73;    /* Appartement */
    --gold:#8F6414;    /* Réservé / valeur */
    --sage:#3F7A49;    /* Disponible */
    --stone:#8B9199;   /* Vendu / Loué */

    --night:#0C1613;
    --night-2:#14261F;

    --radius-sm:12px;
    --radius-md:16px;
    --radius-lg:20px;
    --radius-xl:28px;
    --ease:cubic-bezier(.4,0,.2,1);
    --shadow:0 1px 2px rgba(18,48,39,0.04), 0 10px 24px -14px rgba(18,48,39,0.20);
    --shadow-lg:0 28px 60px -24px rgba(12,22,19,0.34);
    --focus-ring:0 0 0 3px rgba(226,162,44,0.45);
  }
  *{box-sizing:border-box;}
  /* Pas d'overflow-x ici : un `hidden`/`clip` sur html ou body fait de la
     page un conteneur de défilement et neutralise le position:sticky de
     la carte, qui défilait alors avec la liste. Le débordement latéral est
     contenu localement, sur les blocs qui peuvent déborder. */
  html,body{max-width:100%;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.num,.brand{font-family:'Manrope',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums;}
  a{color:inherit;}
  button:focus-visible, a:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible{outline:none;box-shadow:var(--focus-ring);border-radius:10px;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important;animation-iteration-count:1 !important;transition-duration:0.001ms !important;}
  }
  @keyframes fadeInUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  /* ---------- Barre de travail ---------- */
  header{position:sticky;top:0;z-index:40;background:rgba(12,22,19,0.94);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,0.08);}
  /* flex-wrap dès le départ : entre ~680 et ~1100 px, brand + recherche +
     trois boutons + déconnexion ne tiennent pas sur une ligne. L'ancien
     overflow-x:clip masquait le problème en coupant le bouton hors écran. */
  .header-inner{display:flex;flex-wrap:wrap;align-items:center;gap:12px;padding:12px 22px;max-width:1400px;margin:0 auto;}
  .brand{display:flex;align-items:center;gap:11px;flex-shrink:0;}
  .brand img{border-radius:11px;box-shadow:0 4px 14px rgba(0,0,0,0.35);}
  .brand h1{font-size:16px;font-weight:800;margin:0;letter-spacing:-0.01em;color:#fff;}
  .brand p{margin:1px 0 0;font-size:10.5px;color:rgba(255,255,255,0.52);letter-spacing:.06em;text-transform:uppercase;font-weight:600;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:999px;font-weight:700;font-size:13px;cursor:pointer;padding:10px 18px;font-family:'Inter',sans-serif;transition:transform .2s var(--ease), box-shadow .2s var(--ease), background-color .2s var(--ease), filter .2s var(--ease);line-height:1.2;}
  .btn:hover{transform:translateY(-1px);box-shadow:0 10px 22px -12px rgba(12,22,19,0.5);}
  .btn:active{transform:translateY(0);}
  .btn-primary{background:var(--accent);color:#1E1607;box-shadow:0 8px 22px -14px rgba(226,162,44,0.9);}
  .btn-primary:hover{background:var(--accent-dark);}
  .btn-outline{background:var(--surface);color:var(--ink);border:1px solid var(--border);box-shadow:none;}
  .btn-outline:hover{background:var(--surface-alt);border-color:#D5D0C6;}
  .btn-success{background:var(--success);color:#fff;}
  .btn-success:hover{filter:brightness(0.94);}
  .btn-danger{background:var(--danger);color:#fff;box-shadow:var(--shadow);}
  .btn-danger:hover{filter:brightness(0.94);}
  /* Boutons d'action posés sur la barre nuit */
  .btn-inbox{position:relative;background:rgba(255,255,255,0.09);border:1px solid rgba(255,255,255,0.18);color:#fff;}
  .btn-inbox:hover{background:rgba(255,255,255,0.16);border-color:rgba(255,255,255,0.3);}
  .btn-logout{background:none;border:none;color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;cursor:pointer;text-decoration:underline;font-family:'Inter',sans-serif;padding:6px;border-radius:8px;}
  .btn-logout:hover{color:#fff;}
  .inbox-badge{position:absolute;top:-6px;right:-6px;background:var(--danger);color:#fff;font-size:10px;font-weight:800;min-width:19px;height:19px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 5px;box-shadow:0 0 0 2px var(--night);}

  .searchbar{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.16);border-radius:999px;padding:10px 16px;flex:1;max-width:420px;transition:border-color .2s var(--ease), background-color .2s var(--ease), box-shadow .2s var(--ease);}
  .searchbar:focus-within{border-color:var(--accent);background:rgba(255,255,255,0.13);box-shadow:var(--focus-ring);}
  .searchbar svg{stroke:rgba(255,255,255,0.55);flex-shrink:0;}
  .searchbar input{border:none;outline:none;font-size:13px;width:100%;background:transparent;font-family:'Inter',sans-serif;color:#fff;}
  .searchbar input::placeholder{color:rgba(255,255,255,0.42);}

  /* ---------- Filtres & indicateurs ---------- */
  .toolbar{max-width:1400px;margin:0 auto;padding:20px 20px 0;}
  .chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;}
  .chip{flex-shrink:0;border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:9px 17px;font-size:12.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;white-space:nowrap;transition:all .22s var(--ease);font-family:'Inter',sans-serif;}
  .chip:hover{border-color:#CFCABE;background:var(--surface-alt);color:var(--ink);}
  .chip.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 12px 26px -18px rgba(18,48,39,0.9);}
  .chip .count{opacity:.6;font-weight:600;margin-left:4px;}

  .stats{display:flex;gap:12px;overflow-x:auto;margin:18px 0 6px;padding-bottom:4px;scroll-snap-type:x proximity;-webkit-overflow-scrolling:touch;}
  .stat{flex:0 0 auto;min-width:132px;background:var(--surface);border-radius:var(--radius-md);padding:15px 18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:13px;scroll-snap-align:start;overflow:hidden;border:1px solid var(--border);transition:transform .2s var(--ease), box-shadow .2s var(--ease);}
  .stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
  .stat-dot{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .stat-text{min-width:0;}
  .stat .num{font-size:21px;font-weight:800;line-height:1.2;white-space:nowrap;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;}
  .stat .lbl{font-size:11.5px;color:var(--ink-soft);margin-top:2px;white-space:nowrap;font-weight:600;}

  select{border:1.5px solid var(--border);background:var(--surface);border-radius:999px;padding:10px 14px;font-size:12.5px;font-weight:600;font-family:'Inter',sans-serif;color:var(--ink);outline:none;transition:border-color .2s var(--ease);
    appearance:none;-webkit-appearance:none;-moz-appearance:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B7772' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");
    background-repeat:no-repeat;background-position:right 13px center;background-size:15px;padding-right:36px;}
  select:focus{border-color:var(--accent);}

  .view-toggle{display:none;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:4px;margin-top:12px;width:fit-content;}
  .rdv-view-toggle{display:flex;gap:6px;background:var(--surface-alt);border:1px solid var(--border);border-radius:999px;padding:4px;width:fit-content;}
  .view-toggle button, .rdv-view-toggle button{border:none;background:transparent;border-radius:999px;padding:8px 18px;font-size:12.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s var(--ease);}
  .view-toggle button.active, .rdv-view-toggle button.active{background:var(--primary);color:#fff;box-shadow:0 6px 14px -8px rgba(18,48,39,0.8);}

  /* ---------- Liste + carte ---------- */
  .split{max-width:1400px;margin:18px auto 48px;padding:0 20px;display:flex;gap:20px;align-items:flex-start;}
  .panel-list{flex:0 0 44%;display:flex;flex-direction:column;gap:12px;}
  .panel-map{flex:1;position:-webkit-sticky;position:sticky;top:88px;align-self:flex-start;height:calc(100vh - 110px);min-height:440px;border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border);z-index:1;}
  #map{height:100%;width:100%;}

  .legend{position:absolute;bottom:16px;left:16px;z-index:400;background:rgba(255,255,255,0.95);backdrop-filter:blur(8px);border-radius:14px;padding:11px 15px;box-shadow:var(--shadow);font-size:11.5px;border:1px solid var(--border);}
  .legend-row{display:flex;align-items:center;gap:8px;margin:4px 0;font-weight:600;}
  .legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

  /* ---------- Fiche bien (ligne de portefeuille) ---------- */
  .card{background:var(--surface);border-radius:var(--radius-md);padding:15px 16px 15px 17px;box-shadow:var(--shadow);cursor:pointer;transition:transform .25s var(--ease), box-shadow .25s var(--ease), border-color .25s var(--ease);border:1px solid var(--border);border-left-width:4px;border-left-style:solid;display:flex;gap:13px;animation:fadeInUp .4s var(--ease) backwards;}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:#D6D1C6;}
  .card.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent), var(--shadow-lg);}
  .card-icon{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .card-body{flex:1;min-width:0;}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .card-top h3{font-size:15px;font-weight:800;margin:0;letter-spacing:-0.012em;}
  .ref{font-size:10.5px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;}
  .pill{font-size:10.5px;font-weight:800;padding:4px 10px;border-radius:999px;white-space:nowrap;}
  .card-meta{display:flex;align-items:center;gap:6px;color:var(--ink-soft);font-size:12.5px;margin-top:6px;}
  .card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:11px;padding-top:11px;border-top:1px solid var(--border);}
  .surface-txt{font-size:12px;color:var(--ink-soft);font-weight:600;}
  .price{font-size:15px;font-weight:800;color:var(--ink);font-family:'Manrope',sans-serif;letter-spacing:-0.01em;}

  .empty{background:var(--surface);border-radius:var(--radius-lg);padding:56px 24px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border);animation:fadeInUp .35s var(--ease);}

  /* Pagination du portefeuille — n'apparaît qu'au-delà d'une page. */
  .list-pager{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:4px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);box-shadow:var(--shadow);}
  .pager-btn{border:1px solid var(--border);background:var(--surface);color:var(--ink);border-radius:999px;padding:10px 16px;font-size:12.5px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;white-space:nowrap;min-height:40px;transition:all .2s var(--ease);}
  .pager-btn:hover:not(:disabled){border-color:var(--accent);color:var(--gold);background:var(--accent-soft);}
  .pager-btn:active:not(:disabled){transform:scale(.97);}
  .pager-btn:disabled{opacity:.4;cursor:not-allowed;}
  .pager-status{text-align:center;font-size:12.5px;font-weight:800;line-height:1.3;font-family:'Manrope',sans-serif;}
  .pager-status small{display:block;font-size:11px;font-weight:600;color:var(--ink-soft);margin-top:2px;font-family:'Inter',sans-serif;}

  /* ---------- Panneaux latéraux ---------- */
  .overlay{position:fixed;inset:0;background:rgba(10,18,15,0.5);backdrop-filter:blur(2px);z-index:900;opacity:0;pointer-events:none;transition:opacity .22s ease;}
  .overlay.open{opacity:1;pointer-events:auto;}
  .drawer{position:fixed;top:0;right:0;left:0;height:100%;width:100%;max-width:100%;background:var(--bg);z-index:901;transform:translateX(100%);transition:transform .32s var(--ease);overflow-y:auto;box-shadow:var(--shadow-lg);border-radius:0;}
  #inboxDrawer{left:auto;width:470px;max-width:92vw;border-radius:var(--radius-xl) 0 0 var(--radius-xl);background:var(--bg);}
  .drawer.open{transform:translateX(0);}
  .drawer-banner{height:150px;display:flex;align-items:center;justify-content:center;position:relative;background-color:var(--surface-alt);}
  .drawer-close{position:absolute;top:14px;right:14px;background:rgba(12,22,19,0.72);border:none;border-radius:50%;width:42px;height:42px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(0,0,0,0.28);backdrop-filter:blur(6px);transition:transform .15s ease, background-color .15s ease;z-index:3;color:#fff;}
  .drawer-close svg{width:18px;height:18px;}
  .drawer-close svg, .drawer-close svg *{stroke:#fff;fill:#fff;}
  .drawer-close:hover{transform:translateY(-2px);background:var(--danger);}
  .drawer-content{padding:22px 20px 40px;}

  /* Grand écran (fiche détail / formulaire) : on exploite la largeur au lieu
     de laisser le contenu étiré tout seul au milieu de l'écran. */
  @media (min-width: 900px){
    #drawer .drawer-content, #formDrawerPanel .drawer-content{
      max-width:920px;margin:0 auto;padding:40px 48px 64px;
    }
    #drawer .drawer-banner{height:300px;border-radius:0;}
    #drawer .grid2{grid-template-columns:repeat(4,1fr);}
    #formDrawerPanel .form-grid{grid-template-columns:repeat(3,1fr);}
    #formDrawerPanel .photo-grid{gap:12px;}
  }
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;}
  .info-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:13px 15px;}
  .info-box .k{font-size:10.5px;color:var(--ink-soft);display:flex;align-items:center;gap:5px;text-transform:uppercase;letter-spacing:.04em;font-weight:700;}
  .info-box .v{font-size:14.5px;font-weight:800;margin-top:4px;}

  .features{display:flex;gap:10px;margin-top:18px;}
  .feature{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:13px 8px;text-align:center;transition:transform .2s var(--ease), box-shadow .2s var(--ease);}
  .feature:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
  .feature .fi{width:30px;height:30px;border-radius:10px;background:var(--primary);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;}
  .feature .fv{font-size:16px;font-weight:800;font-family:'Manrope',sans-serif;}
  .feature .fl{font-size:10px;color:var(--ink-soft);margin-top:2px;font-weight:600;}
  .section-title{font-size:11px;font-weight:800;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.08em;margin:24px 0 10px;}
  .tags{display:flex;flex-wrap:wrap;gap:7px;}
  .tag{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:6px 13px;font-size:11.5px;font-weight:700;color:var(--ink);}

  /* Changement de statut : la couleur --sc est posée en ligne par le JS. */
  .status-switch{display:flex;gap:8px;flex-wrap:wrap;}
  .status-btn{border:1.5px solid var(--sc);color:var(--sc);background:#fff;border-radius:999px;padding:8px 15px;font-size:11.5px;font-weight:800;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s var(--ease);}
  .status-btn:hover{transform:translateY(-1px);}
  .status-btn.active{background:var(--sc);color:#fff;}

  /* ---------- Badges de confiance (côté gestion) ---------- */
  .confiance-bloc{display:flex;flex-direction:column;gap:9px;}
  .confiance-ligne{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:13px 15px;}
  .confiance-txt{min-width:0;flex:1;}
  .confiance-txt strong{display:block;font-size:13.5px;font-weight:800;}
  .confiance-txt span{display:block;font-size:12px;color:var(--ink-soft);margin-top:3px;}
  .confiance-ligne .btn{flex-shrink:0;padding:9px 16px;font-size:12.5px;min-height:0;}
  .confiance-etat{flex-shrink:0;font-size:11.5px;font-weight:700;color:var(--ink-soft);background:var(--surface-alt);border-radius:999px;padding:6px 12px;}
  .confiance-etat.ok{color:var(--success);background:rgba(47,122,78,0.12);}

  /* ---------- Carte Leaflet ---------- */
  .custom-marker{display:flex;align-items:center;justify-content:center;border-radius:50%;box-shadow:0 3px 10px rgba(0,0,0,0.28);border:2.5px solid #fff;}
  .custom-marker.pulse{animation:pulse 1.1s ease-out infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(226,162,44,0.55),0 3px 10px rgba(0,0,0,0.28);}
    70%{box-shadow:0 0 0 16px rgba(226,162,44,0),0 3px 10px rgba(0,0,0,0.28);}
    100%{box-shadow:0 0 0 0 rgba(226,162,44,0),0 3px 10px rgba(0,0,0,0.28);}
  }
  @keyframes spin{
    to{transform:rotate(360deg);}
  }
  .leaflet-popup-content-wrapper{border-radius:14px;box-shadow:var(--shadow-lg);}
  .leaflet-popup-content{margin:13px 15px;}
  .popup-card{min-width:158px;}
  .popup-card .pt{font-family:'Manrope',sans-serif;font-weight:800;font-size:13.5px;color:var(--ink);margin:0 0 3px;}
  .popup-card .pm{font-size:11.5px;color:var(--ink-soft);}
  .popup-card .pp{font-family:'Manrope',sans-serif;font-weight:800;font-size:14px;color:var(--ink);margin-top:6px;}
  .popup-card .plink{display:inline-block;margin-top:9px;font-size:11.5px;font-weight:800;color:var(--gold);cursor:pointer;}

  /* ---------- Connexion ---------- */
  .auth-overlay{position:fixed;inset:0;background:
      radial-gradient(800px 400px at 70% 0%, rgba(226,162,44,0.16), transparent 62%),
      linear-gradient(155deg, var(--night) 0%, var(--night-2) 60%, #1A1710 100%);
    display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
  .auth-box{background:var(--surface);border-radius:var(--radius-xl);padding:34px 30px;width:100%;max-width:380px;box-shadow:var(--shadow-lg);animation:fadeInUp .4s var(--ease);}
  .auth-box h2{font-size:21px;margin:0 0 6px;letter-spacing:-0.02em;}
  .auth-box p{font-size:12.5px;color:var(--ink-soft);margin:0 0 22px;line-height:1.55;}
  .auth-input{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 15px;font-size:13.5px;font-family:'Inter',sans-serif;color:var(--ink);outline:none;margin-bottom:10px;transition:border-color .2s var(--ease), box-shadow .2s var(--ease);}
  .auth-input:focus{border-color:var(--accent);box-shadow:var(--focus-ring);}
  .auth-error{color:var(--danger);font-size:12px;margin:8px 0 0;min-height:14px;}

  /* ---------- Formulaire d'un bien ---------- */
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .form-field.full{grid-column:1/-1;}
  .form-label{font-size:11px;font-weight:800;color:var(--ink-soft);margin-bottom:5px;display:block;letter-spacing:.02em;}
  .form-input, .form-select, .form-textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;font-size:13.5px;font-family:'Inter',sans-serif;color:var(--ink);outline:none;background:#fff;transition:border-color .2s var(--ease), box-shadow .2s var(--ease);}
  .form-input::placeholder, .form-textarea::placeholder{color:#A6ADA9;}
  .form-input:focus, .form-select:focus, .form-textarea:focus{border-color:var(--accent);box-shadow:var(--focus-ring);}
  .form-textarea{resize:vertical;min-height:80px;}
  .form-error{color:var(--danger);font-size:12px;margin-top:10px;min-height:14px;}
  .toggle-row{display:flex;align-items:center;gap:9px;margin:16px 0 4px;}
  .photo-grid{display:flex;flex-wrap:wrap;gap:9px;margin-top:9px;}
  .photo-thumb{position:relative;width:78px;height:78px;border-radius:var(--radius-sm);overflow:hidden;background:var(--surface-alt);flex-shrink:0;box-shadow:inset 0 0 0 1px var(--border);}
  .photo-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
  .photo-thumb .rm{position:absolute;top:3px;right:3px;background:rgba(12,22,19,0.7);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;line-height:1;cursor:pointer;}
  .photo-thumb .cov-badge{position:absolute;bottom:3px;left:3px;background:var(--accent);color:#1E1607;font-size:8px;font-weight:800;padding:2px 6px;border-radius:6px;}
  .photo-add-btn{width:78px;height:78px;border-radius:var(--radius-sm);border:1.5px dashed var(--border);background:var(--surface-alt);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-soft);flex-shrink:0;transition:all .2s var(--ease);}
  .photo-add-btn:hover{border-color:var(--accent);color:var(--gold);background:var(--accent-soft);}
  .photo-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(62px,80px));gap:8px;margin-top:8px;}
  .photo-strip .thumb-btn{position:relative;width:100%;max-width:80px;aspect-ratio:4/3;border:none;padding:0;border-radius:12px;overflow:hidden;cursor:pointer;background:var(--surface-alt);box-shadow:inset 0 0 0 1px var(--border);transition:transform .2s var(--ease);}
  .photo-strip .thumb-btn:hover{transform:translateY(-2px);}
  .photo-strip .thumb-btn img{width:100%;height:100%;object-fit:cover;display:block;}
  .photo-strip .thumb-btn .thumb-count{position:absolute;inset:0;background:rgba(12,22,19,0.55);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11.5px;font-weight:800;}

  /* ---------- Galerie photo ---------- */
  .gallery-modal{position:fixed;inset:0;background:rgba(8,14,12,0.88);backdrop-filter:blur(4px);z-index:1100;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
  .gallery-modal.hidden{display:none;}
  .gallery-shell{width:min(980px,100%);background:#fff;border-radius:var(--radius-xl);overflow:hidden;box-shadow:var(--shadow-lg);}
  .gallery-main{position:relative;display:flex;align-items:center;justify-content:center;min-height:420px;background:#0D1512;padding:16px;}
  .gallery-main img{max-width:100%;max-height:64vh;object-fit:contain;border-radius:12px;}
  .gallery-nav,.gallery-close{position:absolute;border:none;cursor:pointer;background:rgba(255,255,255,0.94);color:var(--ink);width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);font-size:21px;transition:transform .15s ease;}
  .gallery-close:hover{transform:scale(1.06);}
  .gallery-nav:disabled{opacity:.35;cursor:not-allowed;}
  .gallery-nav{top:50%;transform:translateY(-50%);} .gallery-nav.prev{left:16px;} .gallery-nav.next{right:16px;}
  .gallery-nav:hover{transform:translateY(-50%) scale(1.06);}
  .gallery-close{top:16px;right:16px;}
  .gallery-counter{position:absolute;left:16px;bottom:16px;background:rgba(12,22,19,0.78);color:#fff;padding:7px 12px;border-radius:999px;font-size:11.5px;font-weight:700;}
  .gallery-thumbs{display:flex;gap:8px;padding:12px;overflow-x:auto;background:var(--surface-alt);}
  .gallery-thumbs button{border:2px solid transparent;border-radius:10px;padding:0;width:78px;height:58px;overflow:hidden;cursor:pointer;background:#fff;flex-shrink:0;}
  .gallery-thumbs button.active{border-color:var(--accent);}
  .gallery-thumbs img{width:100%;height:100%;object-fit:cover;display:block;}

  /* ---------- Boîte de réception ---------- */
  .inbox-tabs{display:flex;gap:6px;padding:18px 20px 0;}
  .inbox-tab{flex:1;border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:10px 8px;font-size:12.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s var(--ease);}
  .inbox-tab:hover{border-color:#CFCABE;color:var(--ink);}
  .inbox-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}

  .inbox-search-row{display:flex;gap:8px;padding:12px 20px 0;}
  .inbox-search-input{flex:1;display:flex;align-items:center;gap:8px;border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:0 14px;min-width:0;}
  .inbox-search-input:focus-within{border-color:var(--accent);}
  .inbox-search-input svg{flex-shrink:0;}
  .inbox-search-input input{flex:1;min-width:0;border:none;background:transparent;padding:10px 0;font-size:13px;font-family:'Inter',sans-serif;color:var(--ink);outline:none;}
  .inbox-search-input button{border:none;background:none;color:var(--ink-soft);font-size:17px;line-height:1;cursor:pointer;padding:2px 4px;flex-shrink:0;}
  .inbox-filter-select{border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:0 10px;font-size:12.5px;font-weight:700;color:var(--ink);font-family:'Inter',sans-serif;flex-shrink:0;}

  .inbox-list{padding:16px 20px 26px;display:flex;flex-direction:column;gap:10px;}
  .inbox-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 15px;transition:box-shadow .2s var(--ease), border-color .2s var(--ease);}
  .inbox-item:hover{border-color:#D6D1C6;box-shadow:var(--shadow);}
  .inbox-item.unread{border-color:var(--accent);box-shadow:inset 3px 0 0 var(--accent);}
  .inbox-item .ii-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .inbox-item .ii-name{font-weight:800;font-size:13.5px;}
  .inbox-item .ii-date{font-size:10.5px;color:var(--ink-soft);white-space:nowrap;}
  .inbox-item .ii-contact{font-size:12px;color:var(--gold);margin-top:3px;font-weight:600;}
  .inbox-item .ii-body{font-size:12.5px;margin-top:9px;line-height:1.55;}
  .inbox-item .ii-ref{font-size:11px;color:var(--ink-soft);margin-top:7px;font-family:'IBM Plex Mono',monospace;}
  .inbox-item .ii-actions{display:flex;gap:6px;margin-top:11px;flex-wrap:wrap;}
  .inbox-item .ii-actions button, .inbox-item .ii-actions select{border:1px solid var(--border);background:var(--surface-alt);border-radius:999px;padding:6px 12px;font-size:11.5px;font-weight:700;cursor:pointer;color:var(--ink);font-family:'Inter',sans-serif;}
  .inbox-item .ii-actions button:hover{border-color:var(--accent);color:var(--gold);background:var(--accent-soft);}
  /* Ces petits selects héritent sinon du chevron + du padding de la règle
     globale `select`, trop large pour une pastille de cette taille. */
  .inbox-item .ii-actions select, .inbox-filter-select{background-image:none;padding-right:12px;}
  .inbox-empty{padding:44px 20px;text-align:center;color:var(--ink-soft);font-size:13px;}

  /* ---------- Journal d'activité ---------- */
  #journalDrawer{left:auto;width:520px;max-width:94vw;border-radius:var(--radius-xl) 0 0 var(--radius-xl);background:var(--bg);}
  .journal-tete{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;padding:22px 20px 0;}
  .journal-tete strong{font-family:'Manrope',sans-serif;font-size:18px;letter-spacing:-0.02em;}
  .journal-tete p{margin:3px 0 0;font-size:12.5px;color:var(--ink-soft);}
  .journal-tete .drawer-close{position:static;flex-shrink:0;}
  .journal-filtres{display:flex;gap:7px;overflow-x:auto;padding:16px 20px 4px;}
  .journal-filtres .chip{padding:8px 14px;font-size:12px;}
  .journal-liste{padding:14px 20px 26px;display:flex;flex-direction:column;gap:8px;}
  .journal-item{display:flex;gap:12px;align-items:flex-start;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:13px 14px;}
  .journal-puce{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;line-height:1;}
  .journal-corps{flex:1;min-width:0;}
  .journal-ligne1{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
  .journal-ligne1 strong{font-size:13.5px;font-weight:800;}
  .journal-ref{font-family:'IBM Plex Mono',monospace;font-size:11.5px;font-weight:600;border:1px solid var(--border);background:var(--surface-alt);color:var(--ink);border-radius:999px;padding:3px 10px;cursor:pointer;transition:all .18s var(--ease);}
  .journal-ref:hover{border-color:var(--accent);color:var(--gold);background:var(--accent-soft);}
  /* Bien supprimé : la référence reste lisible mais n'est plus cliquable. */
  .journal-ref-morte{cursor:default;opacity:.55;text-decoration:line-through;}
  .journal-ref-morte:hover{border-color:var(--border);color:var(--ink);background:var(--surface-alt);}
  .journal-transition{display:inline-block;margin-top:5px;font-size:12px;font-weight:700;color:var(--gold);background:var(--accent-soft);border-radius:999px;padding:3px 11px;}
  .journal-meta{margin-top:6px;font-size:11.5px;color:var(--ink-soft);}
  .journal-liste .list-pager{margin-top:10px;}

  /* ---------- Agenda des rendez-vous ---------- */
  .cal-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
  .cal-nav{border:1px solid var(--border);background:var(--surface);border-radius:10px;width:30px;height:30px;cursor:pointer;font-size:16px;line-height:1;color:var(--ink);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s var(--ease);}
  .cal-nav:hover{border-color:var(--accent);color:var(--gold);background:var(--accent-soft);}
  .cal-month-label{flex:1;text-align:center;font-weight:800;font-size:13.5px;text-transform:capitalize;font-family:'Manrope',sans-serif;}
  .cal-today-btn{border:1px solid var(--border);background:var(--surface);border-radius:999px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;color:var(--ink-soft);flex-shrink:0;transition:all .18s var(--ease);}
  .cal-today-btn:hover{border-color:var(--accent);color:var(--gold);background:var(--accent-soft);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .cal-dow{text-align:center;font-size:10px;font-weight:800;color:var(--ink-soft);padding-bottom:4px;text-transform:uppercase;letter-spacing:.04em;}
  .cal-day{aspect-ratio:1;border:1px solid var(--border);border-radius:10px;padding:4px;cursor:pointer;display:flex;flex-direction:column;gap:2px;transition:border-color .15s var(--ease), background .15s var(--ease);overflow:hidden;background:var(--surface);}
  .cal-day:hover{border-color:var(--accent);}
  .cal-day.muted{border:none;cursor:default;background:transparent;}
  .cal-day.today{border-color:var(--primary);border-width:2px;}
  .cal-day.selected{background:var(--accent-soft);border-color:var(--accent);}
  .cal-day-num{font-size:10.5px;font-weight:700;}
  .cal-day-apts{display:flex;flex-direction:column;gap:1px;}
  .cal-apt-chip{font-size:8px;font-weight:800;padding:1px 4px;border-radius:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cal-apt-more{font-size:8px;color:var(--ink-soft);font-weight:700;}

  /* ---------- Tableau de bord analytique ---------- */
  .analytics-overlay{position:fixed;inset:0;background:var(--bg);z-index:1000;overflow-y:auto;}
  .analytics-overlay.hidden{display:none;}
  .analytics-header{position:sticky;top:0;z-index:5;background:rgba(12,22,19,0.96);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,0.08);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;}
  .analytics-header h2{margin:0;font-size:20px;color:#fff;letter-spacing:-0.02em;}
  .analytics-header p{margin:3px 0 0;font-size:12.5px;color:rgba(255,255,255,0.55);}
  .analytics-close{border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.09);border-radius:999px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:background-color .2s var(--ease);}
  .analytics-close:hover{background:rgba(255,255,255,0.18);}
  .analytics-close svg{stroke:#fff;}
  .analytics-body{max-width:1280px;margin:0 auto;padding:26px 24px 40px;}
  .kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:26px;}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:18px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:3px;background:var(--accent);opacity:.85;}
  .kpi-card .kv{font-size:26px;font-weight:800;font-family:'Manrope',sans-serif;line-height:1.1;letter-spacing:-0.02em;font-variant-numeric:tabular-nums;}
  .kpi-card .kl{font-size:11.5px;color:var(--ink-soft);margin-top:5px;font-weight:600;}
  .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
  .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:20px;box-shadow:var(--shadow);}
  .chart-card.full{grid-column:1/-1;}
  .chart-card h3{margin:0 0 16px;font-size:14.5px;font-weight:800;letter-spacing:-0.01em;}
  .chart-card canvas{max-height:260px;}
  .top-list{display:flex;flex-direction:column;gap:9px;}
  .top-list-item{display:flex;align-items:center;gap:11px;font-size:12.5px;}
  .top-list-rank{width:22px;height:22px;border-radius:50%;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:800;color:var(--gold);flex-shrink:0;}
  .top-list-label{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .top-list-count{font-weight:800;font-family:'Manrope',sans-serif;color:var(--ink);flex-shrink:0;font-variant-numeric:tabular-nums;}
  .analytics-empty{text-align:center;color:var(--ink-soft);font-size:12.5px;padding:32px 10px;}
  /* Note de lecture sous les indicateurs : sans elle, « visites organisées »
     et « conversion prospects » se prêtent à des interprétations différentes. */
  .analytics-note{margin:-14px 0 22px;font-size:12px;line-height:1.6;color:var(--ink-soft);background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:12px 15px;}
  .analytics-note strong{color:var(--ink);font-weight:700;}

  /* ---------- Responsive ---------- */
  @media (max-width: 1180px){
    .searchbar{max-width:260px;min-width:0;}
    /* Les libellés des boutons partent avant la recherche : les icônes
       restent explicites et l'en-tête tient sur une seule ligne. */
    .btn-label{display:none;}
  }
  @media (max-width: 1023px){
    .panel-map{position:relative;top:0;height:min(60vh,480px);}
    .split{flex-direction:column;}
    .panel-list, .panel-map{flex:1 1 auto;width:100%;}
    .view-toggle{display:flex;}
    .split[data-view="list"] .panel-map{display:none;}
    .split[data-view="map"] .panel-list{display:none;}
    .kpi-grid{grid-template-columns:repeat(3,1fr);}
    .charts-grid{grid-template-columns:1fr;}
  }

  @media (max-width: 680px){
    .header-inner{flex-wrap:wrap;padding:12px 16px;gap:9px;}
    .brand h1{font-size:15px;}
    .brand p{display:none;}
    /* La recherche et « Déconnexion » partagent la même ligne : le bouton
       occupait une troisième ligne à lui seul sur un en-tête collant qui
       mangeait déjà 154 px, soit un cinquième de l'écran en permanence. */
    /* flex-basis en pourcentage et non `auto` : sinon la barre réclame la
       largeur de son contenu, occupe la ligne entière et repousse le
       bouton sur une troisième. */
    .searchbar{order:3;flex:1 1 55%;min-width:0;max-width:none;margin-top:2px;}
    .btn-label{display:none;}
    .btn-primary, .btn-inbox{padding:10px 14px;}
    .btn-logout{order:4;flex:0 0 auto;white-space:nowrap;padding:11px 8px;min-height:40px;}
    /* Indicateurs resserrés : on en voit trois d'un coup au lieu de deux. */
    .stat{padding:12px 14px;min-width:112px;gap:10px;}
    .stat-dot{width:34px;height:34px;border-radius:10px;}
    .stat .lbl{font-size:11px;}
    /* Bascule Liste/Carte pleine largeur, comme côté client. */
    .view-toggle{width:100%;}
    .view-toggle button{flex:1;min-height:40px;}
    .list-pager{flex-direction:column;padding:14px;}
    .pager-btn{width:100%;}
    .toolbar{padding:16px 16px 0;}
    .split{padding:0 16px;}
    .stat{padding:13px 15px;min-width:120px;}
    .stat .num{font-size:18px;}
    .card{padding:13px 13px 13px 15px;gap:11px;}
    .card-icon{width:42px;height:42px;}
    .card-foot{flex-wrap:wrap;row-gap:5px;}
    .features{flex-wrap:wrap;}
    .feature{flex:1 1 40%;}
    .drawer{
      top:auto;bottom:0;right:0;left:0;width:100% !important;max-width:100% !important;
      height:92vh;border-radius:22px 22px 0 0;
      padding-bottom:env(safe-area-inset-bottom);
      transform:translateY(100%);
    }
    .drawer.open{transform:translateY(0);}
    #inboxDrawer{border-radius:22px 22px 0 0;}
    .drawer-banner{height:150px;border-radius:22px 22px 0 0;}
    .status-btn{padding:10px 16px;min-height:40px;}
    .btn{min-height:44px;}
    .chip{padding:10px 15px;}
    .form-input, .form-select, .form-textarea{padding:12px 13px;font-size:14px;}
    .form-grid{grid-template-columns:1fr;}
    .photo-thumb .rm{width:26px;height:26px;font-size:14px;}
    .gallery-main{min-height:0;padding:12px;}
    .gallery-nav,.gallery-close{width:44px;height:44px;}
  }

  @media (max-width: 560px){
    .kpi-grid{grid-template-columns:repeat(2,1fr);}
    .analytics-body{padding:18px 16px 32px;}
    .analytics-header{padding:14px 16px;}
  }

  @media (max-width: 380px){
    .grid2{grid-template-columns:1fr;}
  }

  /* ---------- Détails transverses ---------- */
  .btn:disabled, button:disabled{opacity:.55;cursor:not-allowed;transform:none !important;box-shadow:none !important;}
  .chips, .stats, .gallery-thumbs, .drawer{scrollbar-width:thin;scrollbar-color:#D5D0C6 transparent;}
  .chips::-webkit-scrollbar, .stats::-webkit-scrollbar, .gallery-thumbs::-webkit-scrollbar{height:6px;}
  .drawer::-webkit-scrollbar{width:6px;}
  .chips::-webkit-scrollbar-thumb, .stats::-webkit-scrollbar-thumb, .gallery-thumbs::-webkit-scrollbar-thumb, .drawer::-webkit-scrollbar-thumb{background:#D5D0C6;border-radius:999px;}
  .chip:active, .btn:active, .inbox-tab:active, .view-toggle button:active{transform:scale(.97);}
</style>
</head>
<body>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <h2>Connexion</h2>
    <p>Espace privé — connectez-vous avec le compte créé dans Supabase Authentication.</p>
    <input class="auth-input" id="authEmail" type="email" placeholder="Email" />
    <input class="auth-input" id="authPassword" type="password" placeholder="Mot de passe" />
    <button class="btn btn-primary" id="authSubmit" style="width:100%;justify-content:center;">Se connecter</button>
    <p class="auth-error" id="authError"></p>
  </div>
</div>

<header>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script>
const TYPE_COLOR = { Terrain:'#B24A2C', Maison:'#2E4A61', Appartement:'#1F7A73', 'Champ agricole':'#6B8E23' };
const STATUS_COLOR = { Disponible:'#3F7A49', 'Réservé':'#B8842A', Vendu:'#8B9199', 'Loué':'#8B9199' };
const STATUS_OPTIONS = { Vente:['Disponible','Réservé','Vendu'], Location:['Disponible','Réservé','Loué'] };
const ICON_SVG = {
  Terrain: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="1"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="3" y1="12" x2="21" y2="12"/></svg>',
  Maison: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>',
  Appartement: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><rect x="4" y="3" width="16" height="18"/><line x1="9" y1="8" x2="9" y2="8"/><line x1="15" y1="8" x2="15" y2="8"/><line x1="9" y1="13" x2="9" y2="13"/><line x1="15" y1="13" x2="15" y2="13"/></svg>',
  'Champ agricole': '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 21V11"/><path d="M12 11Q6 11 6 5Q12 5 12 11Z"/><path d="M12 11Q18 11 18 5Q12 5 12 11Z"/></svg>',
};
// Un type absent de ICON_SVG faisait planter l'ouverture de la fiche : le
// bandeau appelle .replace() sur l'icône, donc sur undefined. Le repli évite
// qu'un futur type de bien reproduise la panne.
function typeIcon(type){
  return ICON_SVG[type] || '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="9"/></svg>';
}
function surfaceUnit(type){ return type === 'Champ agricole' ? 'ha' : 'm²'; }

// ===== CONFIGURATION SUPABASE =====
// Remplacez ces deux valeurs par celles de VOTRE projet
// (Dashboard Supabase > Project Settings > API Keys)
const SUPABASE_URL = 'https://avanktgaxepzpqmsiauz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_nAQnS82ru9h-beIDPKMqPA_JO_aSYc-'; // clé "publishable" (ou "anon" pour les anciens projets)
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// UUID de VOTRE compte (administrateur) — même valeur que dans schema_comptes_collaborateurs.sql.
// Sert uniquement à afficher ou masquer le bouton "Boîte de réception" selon qui est connecté.
const ADMIN_ID = '514ff065-fa33-454b-9701-c9aec9053862';

let PROPERTIES = [];
let IS_ADMIN = false;
let COLLABORATORS = {}; // { user_id: display_name } — chargé uniquement pour l'admin

async function loadCollaborators(){
  const { data } = await db.from('collaborators').select('*');
  COLLABORATORS = {};
  (data || []).forEach(c => { COLLABORATORS[c.user_id] = c.display_name; });
}
function ownerLabel(ownerId){
  if(ownerId === ADMIN_ID) return 'Vous';
  return COLLABORATORS[ownerId] || 'Collaborateur (non nommé)';
}

function mapRow(r){
  return {
    id: r.id, ref: r.ref, type: r.type, operation: r.operation,
    commune: r.commune, region: r.region, quartier: r.quartier || '', departement: r.departement || '', surface: Number(r.surface), price: Number(r.price),
    status: r.status, desc: r.description || '', lat: Number(r.lat), lng: Number(r.lng),
    date: r.date_acquisition || '',
    is_published: !!r.is_published,
    archived_at: r.archived_at || null,
    owner_id: r.owner_id,
    created_at: r.created_at,
    verified_at: r.verified_at || null,
    availability_checked_at: r.availability_checked_at || null,
    photos: r.property_photos || [],
    rooms: (r.chambres != null || (r.equipements && r.equipements.length)) ? { chambres:r.chambres, salons:r.salons, sdb:r.salles_bain, cuisine:r.cuisine, autres:r.equipements || [] } : null
  };
}

// Les photos sont stockées telles que téléversées : jusqu'à 2 Mo et
// 2480x3509 px. La pastille d'une fiche de portefeuille fait 48 px : lui
// servir l'original était absurde. Supabase redimensionne à la volée, on
// lui demande la taille réellement affichée. Sans `width`, l'original.
// Le redimensionnement à la volée dépend de l'offre Supabase. S'il n'est
// pas disponible, on repasse tout le site sur les fichiers d'origine
// plutôt que d'afficher des images cassées.
let PHOTO_RESIZE_OK = true;
let photoResizeChecked = false;

function originalPhotoUrl(u){
  return String(u).split('?')[0]
    .replace('/storage/v1/render/image/public/', '/storage/v1/object/public/');
}

// Filet par image : un fichier isolé peut échouer (format exotique, upload
// corrompu) sans que le service soit en cause.
function photoFallback(img){
  img.onerror = null;
  const orig = originalPhotoUrl(img.src);
  if(orig !== img.src) img.src = orig;
}

// Sonde unique, sur une miniature minuscule : si le service ne répond pas,
// on bascule et on redessine avec les originaux.
async function checkPhotoResize(){
  if(photoResizeChecked || !PHOTO_RESIZE_OK) return;
  photoResizeChecked = true;
  const withPhoto = PROPERTIES.find(p => p.photos && p.photos.length);
  if(!withPhoto) return;
  try{
    const r = await fetch(photoUrl(withPhoto.photos[0].storage_path, 32, 40), { cache:'no-store' });
    if(r.ok) return;
  }catch(e){ /* service injoignable */ }
  PHOTO_RESIZE_OK = false;
  render();
}

function photoUrl(path, width, quality){
  const url = db.storage.from('property-photos').getPublicUrl(path).data.publicUrl;
  if(!width || !PHOTO_RESIZE_OK) return url;
  return url.replace('/storage/v1/object/public/', '/storage/v1/render/image/public/')
    + `?width=${width}&quality=${quality || 65}`;
}
function publicPhotoUrl(path){
  return photoUrl(path);
}
function coverUrl(p, width, quality){
  if(!p.photos || !p.photos.length) return null;
  const cover = p.photos.find(ph=>ph.is_cover) || p.photos[0];
  return photoUrl(cover.storage_path, width, quality);
}

let VIEWS_BY_PROPERTY = {};
async function loadPropertyViews(){
  // RLS filtre déjà : l'admin reçoit tout, un collaborateur ne reçoit que
  // les vues des biens dont il est propriétaire — pas de filtrage à faire ici.
  const { data } = await db.from('property_views').select('property_id');
  VIEWS_BY_PROPERTY = {};
  (data || []).forEach(r => { VIEWS_BY_PROPERTY[r.property_id] = (VIEWS_BY_PROPERTY[r.property_id]||0) + 1; });
}

async function loadProperties(){
  document.getElementById('list').innerHTML = `<div class="empty"><p style="margin:0;color:var(--ink-soft);font-size:13px;">Chargement de vos biens…</p></div>`;
  const { data, error } = await db.from('properties')
    .select('*, property_photos(*)')
    .order('created_at', { ascending:false })
    .order('position', { foreignTable:'property_photos', ascending:true });
  if(error){
    document.getElementById('list').innerHTML = `<div class="empty"><h3 style="margin:0 0 6px;font-size:15px;">Connexion à Supabase impossible</h3><p style="margin:0;color:var(--ink-soft);font-size:12.5px;">${error.message}</p></div>`;
    return;
  }
  PROPERTIES = (data || []).map(mapRow);
  await loadPropertyViews();
  renderStats();
  render();
  checkPhotoResize();
}

const fcfa = n => n.toLocaleString('fr-FR') + ' FCFA';
function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
let state = { type:'Tous', status:'Tous', search:'', selected:null, showArchived:false, page:1 };
// Les fiches du portefeuille sont en une colonne : dix par page = dix lignes.
const PER_PAGE = 10;
let markers = {};

// Ensemble de base selon le mode : biens actifs (par défaut) OU biens archivés.
function baseSet(){
  return PROPERTIES.filter(p => state.showArchived ? p.archived_at : !p.archived_at);
}

// ---- Carte ----
// Initialisation protégée : si Leaflet n'a pas pu se charger (CDN indisponible),
// on NE bloque PAS le reste de l'application — surtout pas l'écran de connexion.
// La carte sera simplement absente ; les listes et le reste fonctionnent.
let map = null;
try {
  map = L.map('map', { zoomControl:true }).setView([14.72,-17.15], 9);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors', maxZoom:19, subdomains:'abc'
  }).addTo(map);
} catch(e){
  console.error('Carte indisponible (Leaflet non chargé) :', e);
  const mapEl = document.getElementById('map');
  if(mapEl){ mapEl.innerHTML = '<div style="padding:20px;font-size:13px;color:var(--ink-soft);text-align:center;">Carte momentanément indisponible.</div>'; }
}

function markerIcon(p, selected){
  return L.divIcon({
    className:'',
    html:`<div class="custom-marker ${selected?'pulse':''}" style="width:${selected?38:32}px;height:${selected?38:32}px;background:${TYPE_COLOR[p.type]}">${typeIcon(p.type)}</div>`,
    iconSize:[selected?38:32, selected?38:32],
    iconAnchor:[selected?19:16, selected?19:16]
  });
}

function popupContent(p){
  return `<div class="popup-card">
    <div class="pt">${p.type} — ${esc(p.commune)}</div>
    <div class="pm">${p.surface} ${surfaceUnit(p.type)}${p.rooms && p.rooms.chambres != null ? ' · '+p.rooms.chambres+' ch. · '+p.rooms.sdb+' sdb' : ''}</div>
    <div class="pp">${fcfa(p.price)}${p.operation==='Location'?' /mois':''}</div>
    <span class="pill" style="background:${STATUS_COLOR[p.status]}22;color:${STATUS_COLOR[p.status]};display:inline-block;margin-top:6px;">${p.status}</span><br/>
    <a class="plink" onclick="openDrawerById('${p.id}')">Voir la fiche complète →</a>
  </div>`;
}
function openDrawerById(id){
  const p = PROPERTIES.find(x=>String(x.id)===String(id));
  if(p){ openDrawer(p); highlightCard(p.id); if(map) map.closePopup(); }
}

function rebuildMarkers(list){
  if(!map || typeof L === 'undefined') return; // carte indisponible : on n'ajoute pas de repères
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  list.forEach(p => {
    const m = L.marker([p.lat,p.lng], { icon: markerIcon(p, String(p.id)===String(state.selected)) });
    m.bindPopup(popupContent(p), { maxWidth:220 });
    m.on('click', () => { highlightCard(p.id); });
    m.addTo(map);
    markers[p.id] = m;
  });
}

// ---- Filtrage ----
function filtered(){
  return baseSet().filter(p=>{
    if(state.type!=='Tous' && p.type!==state.type) return false;
    if(state.status!=='Tous' && p.status!==state.status) return false;
    if(state.search){
      const q=state.search.toLowerCase();
      if(!((p.commune||'').toLowerCase().includes(q)||(p.region||'').toLowerCase().includes(q)||(p.ref||'').toLowerCase().includes(q)||(p.quartier||'').toLowerCase().includes(q))) return false;
    }
    return true;
  });
}

// ---- Chips ----
const NAV = [['Tous','Tous'],['Terrain','Terrains'],['Maison','Maisons'],['Appartement','Appartements'],['Champ agricole','Champs agricoles']];
function renderChips(){
  const set = baseSet();
  const counts = {Terrain:0,Maison:0,Appartement:0,'Champ agricole':0};
  set.forEach(p=>counts[p.type]++);
  const el = document.getElementById('chips');
  el.innerHTML = NAV.map(([key,label])=>{
    const c = key==='Tous' ? set.length : counts[key];
    return `<button class="chip ${state.type===key?'active':''}" data-type="${key}">${label} <span class="count">${c}</span></button>`;
  }).join('');
  el.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{ state.type=b.dataset.type; render(); });
}

// ---- Stats ----
function renderStats(){
  const active = PROPERTIES.filter(p=>!p.archived_at);
  const total = active.length;
  const dispo = active.filter(p=>p.status==='Disponible').length;
  const res = active.filter(p=>p.status==='Réservé').length;
  const clot = active.filter(p=>p.status==='Vendu'||p.status==='Loué').length;
  const valeur = active.filter(p=>p.operation==='Vente').reduce((s,p)=>s+p.price,0);
  const items = [
    ['Biens au total', total, '#1B4F91'],
    ['Disponibles', dispo, '#3F7A49'],
    ['Réservés', res, '#B8842A'],
    ['Vendus / Loués', clot, '#8B9199'],
    ['Valeur (ventes)', fcfa(valeur), '#B24A2C'],
  ];
  document.getElementById('stats').innerHTML = items.map(([lbl,val,col])=>`
    <div class="stat">
      <div class="stat-dot" style="background:${col}22"></div>
      <div class="stat-text"><div class="num mono" style="color:${col}">${val}</div><div class="lbl">${lbl}</div></div>
    </div>`).join('');
}

// ---- Liste ----
function pagerHtml(total, totalPages, start, shown){
  if(totalPages <= 1) return '';
  return `
    <nav class="list-pager" aria-label="Pagination du portefeuille">
      <button type="button" class="pager-btn" data-page-step="-1" ${state.page===1?'disabled':''}>‹ Précédent</button>
      <span class="pager-status">Page ${state.page} sur ${totalPages}<small>${start+1}–${start+shown} sur ${total} biens</small></span>
      <button type="button" class="pager-btn" data-page-step="1" ${state.page===totalPages?'disabled':''}>Suivant ›</button>
    </nav>`;
}

function renderList(){
  const items = filtered();
  const el = document.getElementById('list');
  if(items.length===0){
    el.innerHTML = `<div class="empty"><h3 style="margin:0 0 6px;font-size:15px;">Aucun bien ne correspond</h3><p style="margin:0;color:var(--ink-soft);font-size:12.5px;">Essayez d'élargir la recherche ou de changer de filtre.</p></div>`;
    return;
  }
  // Découpage en pages. La borne est resserrée ici plutôt qu'au clic : un
  // filtre ou un passage en archives peut rendre la page courante inexistante.
  const totalPages = Math.max(1, Math.ceil(items.length / PER_PAGE));
  state.page = Math.min(Math.max(1, state.page), totalPages);
  const start = (state.page - 1) * PER_PAGE;
  const pageItems = items.slice(start, start + PER_PAGE);

  el.innerHTML = pageItems.map(p=>{
    const cover = coverUrl(p, 200, 60);
    return `
    <div class="card ${String(state.selected)===String(p.id)?'selected':''}" data-id="${p.id}" style="border-left-color:${STATUS_COLOR[p.status]}">
      <div class="card-icon" style="background:${cover?`center/cover no-repeat url('${cover}')`:TYPE_COLOR[p.type]}">${cover?'':typeIcon(p.type)}</div>
      <div class="card-body">
        <div class="card-top">
          <div>
            <div class="ref mono">${esc(p.ref)}</div>
            <h3>${p.type} — ${esc(p.commune)}</h3>
          </div>
          <span class="pill" style="background:${STATUS_COLOR[p.status]}22;color:${STATUS_COLOR[p.status]}">${p.status}</span>
        </div>
        <div class="card-meta">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#5C6470" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
          <span>${VIEWS_BY_PROPERTY[p.id] || 0} vue${(VIEWS_BY_PROPERTY[p.id]||0)>1?'s':''}</span>
        </div>
        <div class="card-meta">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#5C6470" stroke-width="2"><path d="M21 10c0 6-9 12-9 12s-9-6-9-12a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span>${p.quartier ? esc(p.quartier)+', ' : ''}${esc(p.region)}</span>
          ${p.rooms && p.rooms.chambres != null ? `<span style="margin:0 2px;">·</span><span>${p.rooms.chambres} ch. · ${p.rooms.salons} salon${p.rooms.salons>1?'s':''} · ${p.rooms.sdb} sdb</span>` : ''}
        </div>
        ${IS_ADMIN ? `<div class="card-meta" style="margin-top:3px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#5C6470" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>Ajouté par ${esc(ownerLabel(p.owner_id))}</span></div>` : ''}
        <div class="card-foot">
          <span class="surface-txt mono">${p.surface} ${surfaceUnit(p.type)}</span>
          <span class="price mono">${fcfa(p.price)}${p.operation==='Location'?' /mois':''}</span>
        </div>
      </div>
    </div>`;
  }).join('') + pagerHtml(items.length, totalPages, start, pageItems.length);

  el.querySelectorAll('[data-page-step]').forEach(btn=>{
    btn.onclick = () => {
      state.page += Number(btn.dataset.pageStep);
      renderList();
      // On remonte en tête de liste, sinon on atterrit au milieu de la
      // page suivante, là où se trouvait le bouton.
      document.getElementById('split').scrollIntoView({ behavior:'smooth', block:'start' });
    };
  });
  el.querySelectorAll('.card').forEach(c=>{
    c.onclick=()=>{
      const p = PROPERTIES.find(x=>String(x.id)===String(c.dataset.id));
      openDrawer(p);
      state.selected = p.id;
      renderList();
      rebuildMarkers(filtered());
      if(map) map.flyTo([p.lat,p.lng], 12, {duration:0.6});
    };
  });
}
function highlightCard(id){
  state.selected = id;
  // La carte affiche tous les marqueurs, pages suivantes comprises : on
  // bascule sur celle qui contient le bien, sinon sa fiche n'existe pas
  // dans le DOM et rien ne défile.
  const idx = filtered().findIndex(x => String(x.id) === String(id));
  if(idx >= 0) state.page = Math.floor(idx / PER_PAGE) + 1;
  renderList();
  rebuildMarkers(filtered());
  const card = document.querySelector('.card.selected');
  if(card){
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  const p = PROPERTIES.find(x => String(x.id) === String(id));
  if(p && map){
    map.flyTo([p.lat, p.lng], 12, { duration: 0.6 });
  }
}

// ---- Drawer détail ----
function getPropertyPhotos(p){
  const photos = Array.isArray(p.photos) ? [...p.photos] : [];
  return photos
    .map(ph => ({ ...ph, url: photoUrl(ph.storage_path, 1600, 75), thumb: photoUrl(ph.storage_path, 200, 60) }))
    .sort((a,b) => (a.position ?? 0) - (b.position ?? 0));
}

function openPhotoGallery(p, startIndex = 0){
  const photos = getPropertyPhotos(p);
  if(!photos.length) return;
  const modal = document.getElementById('galleryModal');
  let currentIndex = Math.max(0, Math.min(startIndex, photos.length - 1));

  function renderGallery(){
    const current = photos[currentIndex];
    modal.innerHTML = `
      <div class="gallery-shell">
        <div class="gallery-main">
          <button type="button" class="gallery-nav prev" data-action="prev" ${currentIndex===0?'disabled':''}>‹</button>
          <img src="${current.url}" alt="Photo ${currentIndex + 1}" />
          <button type="button" class="gallery-nav next" data-action="next" ${currentIndex===photos.length - 1?'disabled':''}>›</button>
          <button type="button" class="gallery-close" data-action="close">×</button>
          <div class="gallery-counter">${currentIndex + 1}/${photos.length}</div>
        </div>
        <div class="gallery-thumbs">
          ${photos.map((ph, idx) => `<button type="button" class="${idx===currentIndex?'active':''}" data-index="${idx}"><img src="${ph.thumb}" alt="Miniature ${idx + 1}" loading="lazy" decoding="async" onerror="photoFallback(this)" /></button>`).join('')}
        </div>
      </div>`;

    modal.querySelector('[data-action="prev"]').onclick = () => { currentIndex = Math.max(0, currentIndex - 1); renderGallery(); };
    modal.querySelector('[data-action="next"]').onclick = () => { currentIndex = Math.min(photos.length - 1, currentIndex + 1); renderGallery(); };
    modal.querySelector('[data-action="close"]').onclick = closePhotoGallery;
    modal.querySelectorAll('[data-index]').forEach(btn => {
      btn.onclick = () => { currentIndex = Number(btn.dataset.index); renderGallery(); };
    });
  }

  renderGallery();
  modal.classList.remove('hidden');
  updateScrollLock();
  modal.onclick = (e) => { if(e.target === modal) closePhotoGallery(); };
}

function closePhotoGallery(){
  const modal = document.getElementById('galleryModal');
  modal.classList.add('hidden');
  modal.innerHTML = '';
  updateScrollLock();
}

function updateScrollLock(){
  const drawerOpen = document.getElementById('drawer') && document.getElementById('drawer').classList.contains('open');
  const formOpen = document.getElementById('formDrawerPanel') && document.getElementById('formDrawerPanel').classList.contains('open');
  const inboxOpen = document.getElementById('inboxDrawer') && document.getElementById('inboxDrawer').classList.contains('open');
  const galleryOpen = document.getElementById('galleryModal') && !document.getElementById('galleryModal').classList.contains('hidden');
  document.body.style.overflow = (drawerOpen || formOpen || inboxOpen || galleryOpen) ? 'hidden' : '';
}

async function archiveProperty(prop){
  if(!confirm("Archiver ce bien ? Il quittera la vitrine cliente et les listes courantes, mais restera consultable et restaurable dans l'onglet Archives.")) return;
  const nowIso = new Date().toISOString();
  const { error } = await db.from('properties').update({ archived_at: nowIso }).eq('id', prop.id);
  if(error){ alert("Archivage impossible : " + error.message); return; }
  prop.archived_at = nowIso;
  renderStats();
  render();
  closeDrawer();
}
async function unarchiveProperty(prop){
  const { error } = await db.from('properties').update({ archived_at: null }).eq('id', prop.id);
  if(error){ alert("Restauration impossible : " + error.message); return; }
  prop.archived_at = null;
  renderStats();
  render();
  closeDrawer();
}
async function deleteProperty(prop){
  if(!confirm('Supprimer DÉFINITIVEMENT ce bien et ses photos ? Cette action est irréversible. (Pour le retirer sans le perdre, utilisez plutôt « Archiver ».)')) return;
  if(prop.photos && prop.photos.length){
    const { error: rmErr } = await db.storage.from('property-photos').remove(prop.photos.map(ph=>ph.storage_path));
    if(rmErr) console.error('Nettoyage Storage échoué (le bien sera quand même supprimé) :', rmErr);
  }
  const { error } = await db.from('properties').delete().eq('id', prop.id);
  if(error){
    alert('Suppression impossible : ' + error.message);
    return;
  }
  PROPERTIES = PROPERTIES.filter(p=>String(p.id)!==String(prop.id));
  state.selected = null;
  renderStats();
  render();
  closeDrawer();
}
async function changeStatus(id, newStatus){
  const prop = PROPERTIES.find(x=>String(x.id)===String(id));
  if(!prop || prop.status===newStatus) return;

  const { data, error } = await db.from('properties').update({ status:newStatus }).eq('id', prop.id).select('*, property_photos(*)').single();
  if(error){
    console.error('Erreur mise à jour statut:', error);
    alert("La mise à jour du statut a échoué : " + error.message);
    return;
  }
  if(!data){
    alert("La mise à jour du statut a échoué : aucune donnée retournée.");
    return;
  }

  const updated = mapRow(data);
  Object.assign(prop, updated);
  renderStats();
  render();
  openDrawer(prop);
}
// Ancienneté d'une confirmation, en clair. Une disponibilité « confirmée il y
// a 4 mois » ne vaut rien : c'est l'âge qui porte l'information, pas la date.
function freshnessLabel(iso){
  const jours = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
  if(jours <= 0) return "aujourd'hui";
  if(jours === 1) return 'hier';
  if(jours < 31) return `il y a ${jours} jours`;
  const mois = Math.floor(jours / 30);
  return mois === 1 ? 'il y a 1 mois' : `il y a ${mois} mois`;
}

// Compresse/redimensionne une photo avant envoi (réduit fortement le poids
// des photos de smartphone). En cas d'échec (ex: format non décodable par
// le navigateur), renvoie le fichier d'origine sans bloquer l'ajout.
function compressImage(file, maxDimension = 1920, quality = 0.82){
  return new Promise((resolve) => {
    if(!file.type.startsWith('image/')){ resolve(file); return; }
    const objectUrl = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(objectUrl);
      let { width, height } = img;
      if(width > maxDimension || height > maxDimension){
        if(width > height){ height = Math.round(height * (maxDimension / width)); width = maxDimension; }
        else { width = Math.round(width * (maxDimension / height)); height = maxDimension; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob((blob) => {
        if(!blob || blob.size >= file.size){ resolve(file); return; }
        const compressed = new File([blob], file.name.replace(/\.\w+$/, '.jpg'), { type:'image/jpeg' });
        console.log(`Photo compressée : ${(file.size/1024).toFixed(0)} Ko → ${(compressed.size/1024).toFixed(0)} Ko`);
        resolve(compressed);
      }, 'image/jpeg', quality);
    };
    img.onerror = () => { URL.revokeObjectURL(objectUrl); resolve(file); };
    img.src = objectUrl;
  });
}

function renderPhotoGrid(){
  const el = document.getElementById('photoGrid');
  const existingHtml = editingPhotos.map(ph => `
    <div class="photo-thumb">
      <img src="${photoUrl(ph.storage_path, 200, 60)}" loading="lazy" decoding="async" onerror="photoFallback(this)" />
      ${ph.is_cover ? '<span class="cov-badge">Couverture</span>' : ''}
      <button type="button" class="rm" data-remove-existing="${ph.id}">×</button>
    </div>`).join('');
  const pendingHtml = pendingFiles.map((pf,i) => `
    <div class="photo-thumb">
      <img src="${pf.previewUrl}" />
      <button type="button" class="rm" data-remove-pending="${i}">×</button>
    </div>`).join('');
  el.innerHTML = existingHtml + pendingHtml + `
    <button type="button" class="photo-add-btn" id="photoAddBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5C6470" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>`;
  document.getElementById('photoAddBtn').onclick = () => document.getElementById('photoInput').click();
  el.querySelectorAll('[data-remove-pending]').forEach(b=>{
    b.onclick = () => { pendingFiles.splice(Number(b.dataset.removePending),1); renderPhotoGrid(); };
  });
  el.querySelectorAll('[data-remove-existing]').forEach(b=>{
    b.onclick = async () => {
      if(!confirm('Supprimer cette photo ?')) return;
      const id = b.dataset.removeExisting;
      const ph = editingPhotos.find(x=>String(x.id)===String(id));
      if(!ph) return;
      b.disabled = true;
      const { error: rmErr } = await db.storage.from('property-photos').remove([ph.storage_path]);
      if(rmErr){ alert("Suppression du fichier impossible : " + rmErr.message); b.disabled = false; return; }
      const { error: delErr } = await db.from('property_photos').delete().eq('id', id);
      if(delErr){ alert("Suppression de la fiche photo impossible : " + delErr.message); b.disabled = false; return; }
      const wasCover = ph.is_cover;
      editingPhotos = editingPhotos.filter(x=>String(x.id)!==String(id));
      // Trier par position pour s'assurer que l'ordre est correct
      editingPhotos.sort((a, b) => (a.position ?? 0) - (b.position ?? 0));
      // Recalculer les positions des photos restantes
      for(let idx=0; idx<editingPhotos.length; idx++){
        if(editingPhotos[idx].position !== idx){
          await db.from('property_photos').update({ position: idx }).eq('id', editingPhotos[idx].id);
          editingPhotos[idx].position = idx;
        }
      }
      // Si la photo supprimée était la couverture, la première photo restante en hérite
      if(wasCover && editingPhotos.length){
        await db.from('property_photos').update({ is_cover:true }).eq('id', editingPhotos[0].id);
        editingPhotos[0].is_cover = true;
      }
      renderPhotoGrid();
    };
  });
}

function initFormMap(lat, lng){

  const hasCoords = !isNaN(lat) && !isNaN(lng);
  const startLat = hasCoords ? lat : 14.6928; // Dakar par défaut
  const startLng = hasCoords ? lng : -17.4467;
  formMapInstance = L.map('formMap', { zoomControl:true }).setView([startLat, startLng], hasCoords ? 14 : 8);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors', maxZoom:19, subdomains:'abc'
  }).addTo(formMapInstance);
  formMarker = L.marker([startLat, startLng], { draggable:true }).addTo(formMapInstance);
  formMarker.on('dragend', () => {
    const pos = formMarker.getLatLng();
    setFormLatLng(pos.lat, pos.lng);
  });
  formMapInstance.on('click', (e) => {
    formMarker.setLatLng(e.latlng);
    setFormLatLng(e.latlng.lat, e.latlng.lng);
  });
  setTimeout(()=>formMapInstance.invalidateSize(), 200);
}

async function geocodeSearch(){
  const query = document.getElementById('f_geocode').value.trim();
  if(!query) return;
  const btn = document.getElementById('f_geocodeBtn');
  const original = btn.textContent;
  btn.disabled = true; btn.textContent = '…';
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&countrycodes=sn&limit=1&q=${encodeURIComponent(query)}`);
    const results = await res.json();
    if(results && results[0]){
      const lat = parseFloat(results[0].lat);
      const lng = parseFloat(results[0].lon);
      setFormLatLng(lat, lng);
      formMarker.setLatLng([lat, lng]);
      formMapInstance.setView([lat, lng], 14);
    } else {
      alert("Aucun résultat trouvé pour cette recherche. Essayez un nom de lieu plus général (ex: la commune seule).");
    }
  } catch(err){
    alert("La recherche a échoué — vérifiez votre connexion internet.");
  }
  btn.disabled = false; btn.textContent = original;
}

// Déduit Commune / Région / Quartier à partir de lat/lng via le géocodage inversé de Nominatim,
// et remplit les champs du formulaire. Retourne true si au moins un champ a pu être rempli.
async function reverseGeocodeAndFill(lat, lng){
  try {
    const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}&addressdetails=1&accept-language=fr&zoom=14`);
    if(!res.ok) return false;
    const data = await res.json();
    const a = data && data.address;
    if(!a) return false;

    // Les libellés OSM varient selon les zones (urbain/rural) : on essaie plusieurs
    // niveaux plausibles, du plus spécifique au plus général.
    const commune = a.city || a.town || a.municipality || a.village || '';
    const region = a.state || a.region || '';
    const departement = a.county || a.state_district || '';
    const quartier = a.suburb || a.neighbourhood || a.quarter || a.city_district || a.hamlet || '';

    if(commune) document.getElementById('f_commune').value = commune;
    if(region) document.getElementById('f_region').value = region;
    if(departement) document.getElementById('f_departement').value = departement;
    if(quartier) document.getElementById('f_quartier').value = quartier;

    return !!(commune || region || departement || quartier);
  } catch(err){
    return false;
  }
}

function useCurrentPosition(){
  if(!navigator.geolocation){ alert("La géolocalisation n'est pas disponible sur cet appareil."); return; }
  
  const btn = document.getElementById('f_geoBtn');
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation:spin 1s linear infinite;"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 0 1 10 10"/></svg><span id="f_geoBtnText">…</span>';
  
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      const { latitude, longitude } = pos.coords;
      setFormLatLng(latitude, longitude);
      formMarker.setLatLng([latitude, longitude]);
      formMapInstance.setView([latitude, longitude], 16);

      const localiseOk = await reverseGeocodeAndFill(latitude, longitude);

      btn.disabled = false;
      btn.innerHTML = originalText;
      const msg = document.createElement('div');
      msg.style.cssText = 'position:fixed;top:20px;right:20px;background:#3F7A49;color:#fff;padding:12px 16px;border-radius:8px;font-size:13px;font-weight:600;z-index:999;box-shadow:var(--shadow-lg)';
      msg.textContent = localiseOk ? '✓ Position capturée et commune/région/quartier remplis' : '✓ Position capturée avec succès';
      document.body.appendChild(msg);
      setTimeout(() => msg.remove(), 3000);
    },
    (err) => {
      btn.disabled = false;
      btn.innerHTML = originalText;
      let message = "Impossible d'obtenir votre position (autorisation refusée ou signal indisponible).";
      if(err.code === 1) message = "Veuillez autoriser la géolocalisation pour utiliser cette fonction.";
      else if(err.code === 3) message = "La géolocalisation a pris trop de temps. Vérifiez votre signal GPS.";
      alert(message);
    },
    { enableHighAccuracy:true, timeout:10000 }
  );
}

function generatePropertyRef(type){
  const prefix = type === 'Terrain' ? 'TF' : type === 'Maison' ? 'MA' : type === 'Champ agricole' ? 'CH' : 'AP';
  const year = new Date().getFullYear();
  const suffix = Math.floor(Math.random() * 9000 + 1000);
  return `${prefix}-${year}-${suffix}`;
}

async function saveProperty(existing){
  const errEl = document.getElementById('formError');
  errEl.textContent = '';

  const type = document.getElementById('f_type').value;
  const operation = document.getElementById('f_operation').value;
  const payload = {
    ref: document.getElementById('f_ref').value.trim(),
    type, operation,
    status: document.getElementById('f_status').value,
    commune: document.getElementById('f_commune').value.trim(),
    region: document.getElementById('f_region').value.trim(),
    departement: document.getElementById('f_departement').value.trim(),
    quartier: document.getElementById('f_quartier').value.trim() || null,
    lat: parseFloat(document.getElementById('f_lat').value),
    lng: parseFloat(document.getElementById('f_lng').value),
    surface: parseFloat(document.getElementById('f_surface').value),
    price: parseFloat(document.getElementById('f_price').value),
    description: document.getElementById('f_desc').value.trim() || null,
    is_published: document.getElementById('f_published').checked,
    chambres: null, salons: null, salles_bain: null, cuisine: null, equipements: null
  };
  if(!existing){
    payload.date_acquisition = new Date().toISOString().slice(0, 10);
  }

  if(!payload.ref || !payload.commune || !payload.region || !payload.departement || isNaN(payload.lat) || isNaN(payload.lng) || isNaN(payload.surface) || isNaN(payload.price)){
    errEl.textContent = 'Merci de renseigner tous les champs obligatoires (référence, commune, région, département, latitude, longitude, superficie, prix).';
    return;
  }

  if(type !== 'Terrain' && type !== 'Champ agricole'){
    const chambres = document.getElementById('f_chambres').value;
    const salons = document.getElementById('f_salons').value;
    const sdb = document.getElementById('f_sdb').value;
    payload.chambres = chambres ? parseInt(chambres) : null;
    payload.salons = salons ? parseInt(salons) : null;
    payload.salles_bain = sdb ? parseInt(sdb) : null;
    payload.cuisine = document.getElementById('f_cuisine').value;
  }
  const equipEl = document.getElementById('f_equip');
  if(equipEl){
    const equip = equipEl.value;
    payload.equipements = equip ? equip.split(',').map(e=>e.trim()).filter(Boolean) : null;
  }

  const saveBtn = document.getElementById('formSave');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Enregistrement…';

  let propertyId;
  if(existing){
    const { data, error } = await db.from('properties').update(payload).eq('id', existing.id).select().single();
    if(error){ errEl.textContent = "Échec de l'enregistrement : " + error.message; saveBtn.disabled=false; saveBtn.textContent='Enregistrer les modifications'; return; }
    propertyId = data.id;
  } else {
    const { data, error } = await db.from('properties').insert(payload).select().single();
    if(error){ errEl.textContent = "Échec de l'enregistrement : " + error.message; saveBtn.disabled=false; saveBtn.textContent='Ajouter ce bien'; return; }
    propertyId = data.id;
  }

  if(pendingFiles.length){
    const hadNoPhotos = editingPhotos.length === 0;
    let photoErrors = [];
    for(let i=0;i<pendingFiles.length;i++){
      const file = pendingFiles[i].file;
      const safeName = file.name
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')   // enlève les accents
        .replace(/[^a-zA-Z0-9.\-_]/g, '_');                  // remplace espaces/parenthèses/etc.
      const path = `${propertyId}/${Date.now()}-${i}-${safeName}`;
      const { error: upErr } = await db.storage.from('property-photos').upload(path, file);
      if(upErr){
        console.error('Upload photo échoué:', upErr);
        photoErrors.push(`${file.name}: ${upErr.message}`);
        continue;
      }
      const { error: insertErr } = await db.from('property_photos').insert({
        property_id: propertyId,
        storage_path: path,
        position: editingPhotos.length + i,
        is_cover: hadNoPhotos && i===0
      });
      if(insertErr){
        console.error('Insertion métadonnée photo échouée:', insertErr);
        photoErrors.push(`Métadonnée de ${file.name}: ${insertErr.message}`);
      }
    }
    if(photoErrors.length){
      // Le bien est bien enregistré ; seules certaines photos ont échoué.
      // On referme quand même (pas de renvoi en double possible) et on alerte clairement.
      alert("Le bien a été enregistré, mais certaines photos n'ont pas pu être importées :\n\n" + photoErrors.join('\n') + "\n\nVous pouvez réessayer de les ajouter via 'Modifier'.");
    }
  }

  closeForm();
  await loadProperties();
}

function fmtDate(iso){
  return new Date(iso).toLocaleDateString('fr-FR', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
// Date "AAAA-MM-JJ" (colonne date) affichée sans décalage de fuseau : on force
// l'interprétation en heure locale plutôt qu'en UTC (sinon un jour peut sauter).
function localDateStr(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDateOnly(dateStr){
  if(!dateStr) return '';
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('fr-FR');
}

// Vérifie si un texte de recherche apparaît dans un ensemble de champs
// (nom, contact, message, référence du bien...), insensible à la casse et aux accents.
function matchesInboxSearch(fields){
  if(!inboxSearch.trim()) return true;
  const norm = s => String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  const q = norm(inboxSearch);
  return fields.some(f => norm(f).includes(q));
}
